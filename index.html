<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司出勤管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat 版，支援直接開啟 HTML 檔案) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"
  onerror="window._firebaseLoadError=true"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"
  onerror="window._firebaseLoadError=true"></script>
<style>
:root{
  --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#dddbd2;
  --ink:#1a1916;--ink2:#6b6860;--ink3:#a8a69e;
  --accent:#c8402a;--accent-light:#fdf2f0;
  --green:#1e7d5a;--green-light:#edf7f3;
  --orange:#d4750a;--orange-light:#fdf6ec;
  --blue:#2456a4;--blue-light:#eef3fb;
  --purple:#7c3aed;--purple-light:#f3f0ff;
  --teal:#0f7490;--teal-light:#ecfafd;
  --rose:#be185d;--rose-light:#fdf2f7;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);
  --shadow:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 8px 40px rgba(0,0,0,.14);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
nav{background:var(--ink);color:#fff;display:flex;align-items:center;padding:0 28px;height:58px;gap:14px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.nav-logo{font-size:17px;font-weight:900;letter-spacing:-.02em;display:flex;align-items:center;gap:10px}
.nav-logo span{font-size:10px;font-weight:400;color:rgba(255,255,255,.4);letter-spacing:.12em;text-transform:uppercase;padding-left:10px;border-left:1px solid rgba(255,255,255,.15)}
#nav-clock{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;color:rgba(255,255,255,.65)}
.sync-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6);padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6b7280;transition:background .4s}
.sync-dot.ok{background:#4ade80}
.sync-dot.syncing{background:#fbbf24;animation:blink .7s infinite}
.sync-dot.error{background:#f87171}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:13px 14px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-bottom:-1px;flex-shrink:0}
.tab-btn:hover{color:var(--ink)}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
.tab-special{margin-left:auto;border:1px solid var(--border);border-radius:8px;margin-bottom:0;padding:7px 13px;font-size:12px;font-weight:600}
.tab-team{color:var(--teal)}.tab-team:hover{background:var(--teal-light)}.tab-team.active{background:var(--teal);color:#fff;border-color:var(--teal)}
.tab-hr{color:var(--blue)}.tab-hr:hover{background:var(--blue-light)}.tab-hr.active{background:var(--blue);color:#fff;border-color:var(--blue)}
main{padding:26px 28px 60px;max-width:900px;margin:0 auto}
.emp-header{display:flex;align-items:center;gap:16px;margin-bottom:26px}
.emp-avatar{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(0,0,0,.22)}
.emp-info h2{font-size:19px;font-weight:700}.emp-info p{font-size:12px;color:var(--ink2);margin-top:2px}
.today-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.card-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title::after{content:'';flex:1;height:1px;background:var(--border)}
.punch-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.punch-slot{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.punch-slot-label{font-size:11px;color:var(--ink2);margin-bottom:5px;font-weight:500}
.punch-time-val{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:600;color:var(--ink3);transition:color .2s}
.punch-time-val.set-in{color:var(--green)}.punch-time-val.set-out{color:var(--orange)}.punch-time-val.set-ot{color:var(--purple)}
.punch-meta{font-size:11px;color:var(--ink3);margin-top:3px}
.duration-row{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);background:var(--blue-light);border:1px solid #c8d8f0;border-radius:20px;padding:4px 13px;margin-bottom:10px}
.lunch-note{display:inline-flex;align-items:center;gap:7px;font-size:11px;color:var(--ink2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 12px;margin-bottom:16px}
.btn-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.btn{padding:10px 14px;border:none;border-radius:10px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-in{background:var(--green-light);color:var(--green);border:1px solid #b3dccb}.btn-in:hover{background:#d5eee5}
.btn-out{background:var(--orange-light);color:var(--orange);border:1px solid #f0ceaa}.btn-out:hover{background:#faecd5}
.btn-save-full{background:var(--ink);color:#fff;width:100%}.btn-save-full:hover{background:#333}
.manual-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:13px}
.field label{font-size:11px;color:var(--ink2);font-weight:500;display:block;margin-bottom:5px}
input[type=time],input[type=date],textarea,select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 11px;outline:none;transition:border-color .15s}
input[type=time]{font-family:'JetBrains Mono',monospace}
input:focus,textarea:focus,select:focus{border-color:var(--teal)}
textarea{resize:none;line-height:1.6}textarea::placeholder{color:var(--ink3)}select{cursor:pointer}
.history-item{display:flex;align-items:start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.history-date{font-size:13px;font-weight:600;margin-bottom:4px}
.history-times{display:flex;gap:13px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2)}
.t-in{color:var(--green);font-weight:600}.t-out{color:var(--orange);font-weight:600}
.history-note{font-size:12px;color:var(--ink2);margin-top:5px;background:var(--surface2);border-radius:6px;padding:5px 9px}
.btn-del-sm{background:none;border:none;color:var(--ink3);cursor:pointer;padding:3px 6px;border-radius:5px;font-size:13px;margin-left:auto;flex-shrink:0;line-height:1}
.btn-del-sm:hover{color:var(--accent);background:var(--accent-light)}
.empty-msg{text-align:center;color:var(--ink3);font-size:13px;padding:26px 0}
.leave-item{display:flex;align-items:start;gap:11px;padding:12px 0;border-bottom:1px solid var(--border)}
.leave-item:last-child{border-bottom:none}
.leave-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px}
.leave-tag-annual{background:var(--teal-light);color:var(--teal)}.leave-tag-sick{background:#fff3e0;color:#b45309}
.leave-tag-personal{background:var(--blue-light);color:var(--blue)}.leave-tag-comp{background:var(--purple-light);color:var(--purple)}
.leave-tag-marriage{background:var(--rose-light);color:var(--rose)}.leave-tag-funeral{background:#f3f4f6;color:#374151}
.leave-tag-other{background:var(--surface2);color:var(--ink2)}
.days-badge{font-size:11px;font-weight:700;background:var(--teal-light);color:var(--teal);border-radius:20px;padding:2px 8px;margin-left:5px}
.leave-date-range{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2);margin-top:4px}
.status-pill{font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px}
.sp-pending{background:#fff3e0;color:#b45309}.sp-approved{background:var(--green-light);color:var(--green)}.sp-rejected{background:var(--accent-light);color:var(--accent)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px;margin-bottom:20px}
.team-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;box-shadow:var(--shadow-sm);transition:border-color .2s}
.team-card:hover{border-color:var(--teal)}
.team-head{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.team-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.hr-toolbar{display:flex;align-items:flex-end;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.hr-toolbar>div label{font-size:11px;color:var(--ink2);font-weight:500;display:block;margin-bottom:4px}
.hr-toolbar select,.hr-toolbar input[type=date]{width:auto;min-width:110px}
.btn-export{background:var(--green);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-export:hover{background:#165f44}
.hr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.hr-stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px}
.hr-stat-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--ink)}.hr-stat-lbl{font-size:11px;color:var(--ink2);margin-top:2px}
.hr-table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);overflow-x:auto}
.hr-subtabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.hr-subtab{padding:9px 16px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-bottom:-1px}
.hr-subtab:hover{color:var(--ink)}.hr-subtab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:580px}
thead{background:var(--surface2);border-bottom:1px solid var(--border)}
th{padding:11px 13px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink2);white-space:nowrap}
td{padding:10px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--surface2)}
.emp-chip{display:inline-flex;align-items:center;gap:6px;font-weight:600}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.badge{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:20px;font-weight:600}
.badge-in{background:var(--green-light);color:var(--green)}.badge-out{background:var(--orange-light);color:var(--orange)}
.badge-dur{background:var(--blue-light);color:var(--blue)}.badge-miss{background:#fdf0f0;color:#c0392b}
.badge-ot{background:var(--purple-light);color:var(--purple)}.badge-lv{background:var(--teal-light);color:var(--teal)}
.note-cell{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink2);font-size:12px}
.btn-approve{padding:4px 9px;font-size:11px;background:var(--green-light);color:var(--green);border:1px solid #b3dccb;border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;margin-right:4px}
.btn-reject{padding:4px 9px;font-size:11px;background:var(--accent-light);color:var(--accent);border:1px solid #f5c4bc;border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600}
.btn-reset{padding:4px 9px;font-size:11px;background:var(--surface2);color:var(--ink2);border:1px solid var(--border);border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;margin-left:4px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--surface);border-radius:var(--radius);padding:30px;width:320px;box-shadow:var(--shadow-lg)}
.modal h3{font-size:17px;font-weight:700;margin-bottom:7px}.modal p{font-size:13px;color:var(--ink2);margin-bottom:18px}
.modal input[type=password]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--ink);font-size:17px;letter-spacing:.2em;padding:11px 13px;outline:none;margin-bottom:12px}
.modal input[type=password]:focus{border-color:var(--accent)}
.modal-btns{display:flex;gap:10px}
.btn-mc{flex:1;padding:10px;border:1px solid var(--border);background:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink2)}
.btn-mo{flex:1;padding:10px;background:var(--ink);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600}
.modal-err{font-size:12px;color:var(--accent);margin-bottom:9px;display:none}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.pending-dot{display:inline-block;width:7px;height:7px;background:var(--orange);border-radius:50%;margin-left:5px;vertical-align:middle}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .22s ease}
@media(max-width:600px){main{padding:18px 14px 60px}nav,.tabs-bar{padding:0 14px}.punch-grid,.manual-row{grid-template-columns:1fr}.hr-stats{grid-template-columns:1fr 1fr}.team-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">⏺ 出勤管理<span>Attendance System</span></div>
  <div class="sync-badge">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">連線中…</span>
  </div>
  <div id="nav-clock">00:00:00</div>
</nav>

<div class="tabs-bar" id="tabs-bar">
  <button class="tab-btn tab-special tab-team" id="team-tab" onclick="showTeamView()">👥 同仁請假總覽</button>
  <button class="tab-btn tab-special tab-hr"  id="hr-tab"   onclick="openHR()">🔐 HR 主管</button>
</div>

<main id="main"></main>

<div class="modal-bg" id="hr-modal" style="display:none">
  <div class="modal">
    <h3>🔐 主管 / HR 登入</h3>
    <p>請輸入密碼以進入簽核介面</p>
    <input type="password" id="hr-pw" placeholder="••••" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-err" id="pw-err">密碼錯誤，請再試一次</div>
    <div class="modal-btns">
      <button class="btn-mc" onclick="closeHRModal()">取消</button>
      <button class="btn-mo" onclick="checkPw()">進入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════
//  Firebase 初始化
// ════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCP_tx_SU0I-c44Z88RDfsASLHi8zy6BQ4",
  authDomain: "attendance-management-613a6.firebaseapp.com",
  databaseURL: "https://attendance-management-613a6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "attendance-management-613a6",
  storageBucket: "attendance-management-613a6.firebasestorage.app",
  messagingSenderId: "189554042903",
  appId: "1:189554042903:web:2bdad6f0c334ff70319452"
};
// ── Firebase 安全初始化 ──────────────────────────────────
let db = null;
let _firebaseOk = false;

function initFirebase() {
  try {
    if (window._firebaseLoadError || typeof firebase === 'undefined') {
      showFirebaseError();
      return;
    }
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    _firebaseOk = true;
    setSync('ok');
  } catch(e) {
    showFirebaseError();
  }
}

function showFirebaseError() {
  setSync('error');
  document.getElementById('main').innerHTML = `
    <div style="max-width:500px;margin:60px auto;text-align:center;padding:0 20px">
      <div style="font-size:48px;margin-bottom:20px">⚠️</div>
      <h2 style="font-size:20px;font-weight:700;margin-bottom:12px;color:var(--ink)">Firebase 無法連線</h2>
      <p style="font-size:14px;color:var(--ink2);line-height:1.8;margin-bottom:24px">
        瀏覽器封鎖了 Firebase 連線。<br>請依以下步驟解決：
      </p>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:left;margin-bottom:20px">
        <div style="font-size:13px;line-height:2;color:var(--ink)">
          <div>① 在 Chrome 網址列輸入：</div>
          <div style="background:var(--surface2);border-radius:6px;padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;margin:4px 0 10px">chrome://flags/#block-insecure-private-network-requests</div>
          <div>② 將該選項設為 <strong>Disabled</strong></div>
          <div>③ 重新啟動 Chrome</div>
          <div>④ 重新開啟此 HTML 檔案</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:16px">或者，改用以下方式開啟：</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:left">
        <div style="font-size:13px;color:var(--ink);line-height:2">
          <div>① 在 HTML 檔案所在資料夾按住 <strong>Shift + 右鍵</strong></div>
          <div>② 選「在此處開啟 PowerShell 視窗」</div>
          <div>③ 輸入：<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px">python -m http.server 8080</code></div>
          <div>④ 用 Chrome 開啟：<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:12px">http://localhost:8080</code></div>
        </div>
      </div>
    </div>
  `;
}

// 等待 Firebase SDK 載入後初始化
window.addEventListener('load', initFirebase);

// ════════════════════════════════════════════════════
//  基本設定
// ════════════════════════════════════════════════════
const EMPLOYEES   = ['郭宗銘','劉芝杏','陳碧真','黃美瑛','黃玉珠','蘇怡娟','黃信恆'];
const COLORS      = ['#c8402a','#2456a4','#1e7d5a','#8b3db8','#d4750a','#b5386e','#2e7d9a'];
const HR_PW       = '1234'; // ← 可自行修改密碼
const WDS         = ['日','一','二','三','四','五','六'];
const LUNCH_START = '12:00';   // 午休開始
const LUNCH_END   = '13:30';   // 午休結束
const LUNCH_MINS  = 90;        // 自動扣除 90 分鐘
const LEAVE_TYPES = [
  {id:'annual',  label:'特休假', emoji:'🌴'},
  {id:'sick',    label:'病假',   emoji:'🤒'},
  {id:'personal',label:'事假',   emoji:'📋'},
  {id:'comp',    label:'補休',   emoji:'🔄'},
  {id:'marriage',label:'婚假',   emoji:'💍'},
  {id:'funeral', label:'喪假',   emoji:'🕯️'},
  {id:'other',   label:'其他',   emoji:'📌'},
];

// ════════════════════════════════════════════════════
//  狀態
// ════════════════════════════════════════════════════
let curTab = 0, hrOk = false, todayState = {};
let liveRefs = [];   // 即時監聽，切頁時取消

// ════════════════════════════════════════════════════
//  工具函式
// ════════════════════════════════════════════════════
const today   = () => new Date().toISOString().slice(0,10);
const ltInfo  = id  => LEAVE_TYPES.find(t=>t.id===id)||LEAVE_TYPES[6];
const ldays   = (f,t) => { if(!f||!t)return 0; return Math.max(0,Math.round((new Date(t)-new Date(f))/86400000)+1); };

// 請假時數/天數換算（8小時為1天，以30分鐘起跳）
const WORK_HOURS = 8;
function leaveHoursFromType(half, customH) {
  if (half === 'custom') {
    const h = parseFloat(customH);
    return isNaN(h) ? 8 : Math.min(7.5, Math.max(0.5, Math.round(h*2)/2));
  }
  const map = { 'full':8, 'half_am':4, 'half_pm':4 };
  if (map[half] !== undefined) return map[half];
  // legacy hour values like '2h','1.5h' etc.
  const m = half.match(/^([\d.]+)h$/);
  if (m) return parseFloat(m[1]);
  return 8;
}
function leaveDaysFromType(half, dayCount, customH) {
  if(!half || half==='full') return dayCount;
  if(half==='half_am'||half==='half_pm') return dayCount * 0.5;
  const hrs = leaveHoursFromType(half, customH);
  return parseFloat((hrs / WORK_HOURS).toFixed(4));
}
function leaveDisplayStr(half, dayCount, customH) {
  if(!half || half==='full') return dayCount + '天';
  if(half==='half_am') return '上午半天';
  if(half==='half_pm') return '下午半天';
  const hrs = leaveHoursFromType(half, customH);
  if(hrs === 0.5) return '30分鐘';
  return hrs % 1 === 0 ? hrs + '小時' : hrs + '小時';
}
function leaveHalfLabel(half, customH) {
  if(half==='custom') {
    const hrs = leaveHoursFromType('custom', customH);
    return ' (' + (hrs===0.5?'30分鐘': hrs+'小時') + ')';
  }
  const map = { 'full':'', 'half_am':' (上午半天)', 'half_pm':' (下午半天)' };
  if(map[half] !== undefined) return map[half];
  const m = half.match(/^([\d.]+)h$/);
  if(m){ const h=parseFloat(m[1]); return ' ('+(h===0.5?'30分鐘':h+'小時')+')'; }
  return '';
}
const nameKey = n  => n.replace(/[.#$[\]/]/g,'_');
const lighten = hex => '#'+hex.replace(/^#/,'').match(/.{2}/g).map(c=>Math.min(255,parseInt(c,16)+60).toString(16).padStart(2,'0')).join('');
const fmtDate = d  => { const o=new Date(d+'T00:00:00'); return `${d}（星期${WDS[o.getDay()]}）`; };

// 將時間字串轉成分鐘數
const toMins = t => { if(!t)return null; const [h,m]=t.split(':').map(Number); return h*60+m; };

// 計算實際工時（自動扣午休）
function calcWorkMins(inT, outT) {
  const i=toMins(inT), o=toMins(outT);
  if(i==null||o==null||o<=i) return null;
  let work = o - i;
  // 若工作時段涵蓋午休，扣除重疊部分
  const ls=toMins(LUNCH_START), le=toMins(LUNCH_END);
  const overlapStart = Math.max(i, ls);
  const overlapEnd   = Math.min(o, le);
  if(overlapEnd > overlapStart) work -= (overlapEnd - overlapStart);
  return work > 0 ? work : 0;
}

function calcDurObj(inT, outT) {
  const m = calcWorkMins(inT, outT);
  if(m==null) return null;
  return { h: Math.floor(m/60), m: m%60, total: m };
}

// 加班單純用時間差，不扣午休
function calcOtObj(a, b) {
  const ai=toMins(a), bi=toMins(b);
  if(ai==null||bi==null||bi<=ai) return null;
  const m=bi-ai;
  return { h:Math.floor(m/60), m:m%60, total:m };
}

function durStr(obj) { return obj ? `${obj.h}h${obj.m.toString().padStart(2,'0')}m` : '--'; }

// ════════════════════════════════════════════════════
//  同步狀態顯示
// ════════════════════════════════════════════════════
function setSync(s){
  const dot=document.getElementById('sync-dot'), lbl=document.getElementById('sync-label');
  if(!dot) return;
  dot.className='sync-dot'+(s==='ok'?' ok':s==='syncing'?' syncing':s==='error'?' error':'');
  lbl.textContent={ok:'即時同步中 ✓',syncing:'同步中…',error:'連線失敗',init:'連線中…'}[s]||s;
}

function clearListeners(){
  liveRefs.forEach(r=>r.off());
  liveRefs=[];
}

//  Clock
// ════════════════════════════════════════════════════
setInterval(()=>{
  const el=document.getElementById('nav-clock');
  if(el) el.textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false});
},1000);

// ════════════════════════════════════════════════════
//  Tabs
// ════════════════════════════════════════════════════
function buildTabs(){
  const bar=document.getElementById('tabs-bar');
  bar.querySelectorAll('.emp-tab').forEach(e=>e.remove());
  const teamBtn=document.getElementById('team-tab');
  EMPLOYEES.forEach((name,i)=>{
    const btn=document.createElement('button');
    btn.className='tab-btn emp-tab'+(i===curTab&&!hrOk?' active':'');
    btn.textContent=name; btn.onclick=()=>switchTab(i);
    bar.insertBefore(btn,teamBtn);
  });
  refreshPendingDot();
}

function refreshPendingDot(){
  db.ref('leaves').once('value').then(snap=>{
    const all=snap.val()||{};
    const has=Object.values(all).some(emp=>Object.values(emp||{}).some(l=>l.status==='pending'));
    const btn=document.getElementById('hr-tab');
    let dot=btn.querySelector('.pending-dot');
    if(has&&!dot){dot=document.createElement('span');dot.className='pending-dot';btn.appendChild(dot);}
    if(!has&&dot)dot.remove();
  });
}

function switchTab(i){
  clearListeners(); curTab=i; hrOk=false; buildTabs();
  document.getElementById('hr-tab').classList.remove('active');
  document.getElementById('team-tab').classList.remove('active');
  renderEmp(EMPLOYEES[i]);
}

// ════════════════════════════════════════════════════
//  HR 登入
// ════════════════════════════════════════════════════
function openHR(){
  if(hrOk){ showHR(); return; }
  document.getElementById('hr-modal').style.display='flex';
  document.getElementById('hr-pw').value='';
  document.getElementById('pw-err').style.display='none';
  setTimeout(()=>document.getElementById('hr-pw').focus(),50);
}
function closeHRModal(){ document.getElementById('hr-modal').style.display='none'; }
function checkPw(){
  if(document.getElementById('hr-pw').value===HR_PW){
    hrOk=true; closeHRModal(); clearListeners(); buildTabs();
    document.getElementById('hr-tab').classList.add('active');
    document.getElementById('team-tab').classList.remove('active');
    showHR();
  } else {
    document.getElementById('pw-err').style.display='block';
    document.getElementById('hr-pw').value='';
    document.getElementById('hr-pw').focus();
  }
}

              ${lv.status==='rejected'&&lv.rejectReason?`<div style="font-size:11px;color:var(--accent);margin-top:4px">否准原因：${lv.rejectReason}</div>`:''}
            </div>

  // 即時監聽
  const aRef=db.ref(`attendance/${nameKey(name)}`);

  aRef.on('value', snap=>{ attendData=snap.val()||{}; draw(); setSync('ok'); }, ()=>setSync('error'));
  lRef.on('value', snap=>{ leaveData=snap.val()||{};  draw(); });
  liveRefs.push(aRef, lRef);
}

// ════════════════════════════════════════════════════
//  打卡
// ════════════════════════════════════════════════════
function punch(name, type){
  const now=new Date(), t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!todayState[name]) todayState[name]={in:'',out:'',otStart:'',otEnd:''};
  todayState[name][type]=t;
  const idx=EMPLOYEES.indexOf(name);
  const dispId={in:`pi-${idx}`,out:`po-${idx}`,otStart:`ps-${idx}`,otEnd:`pe-${idx}`}[type];
  const inpId ={in:`mi-${idx}`,out:`mo-${idx}`,otStart:`ms-${idx}`,otEnd:`me-${idx}`}[type];
  const cls   ={in:'set-in',out:'set-out',otStart:'set-ot',otEnd:'set-ot'}[type];
  const label ={in:'上班',out:'下班',otStart:'加班開始',otEnd:'加班結束'}[type];
  const el=document.getElementById(dispId), inp=document.getElementById(inpId);
  if(el){ el.textContent=t; el.className=`punch-time-val ${cls}`; }
  if(inp) inp.value=t;
  showToast(`✅ ${name} ${label} ${t}`);
}

function manualSet(name, type, val){
  if(!todayState[name]) todayState[name]={in:'',out:'',otStart:'',otEnd:''};
  todayState[name][type]=val;
}

function saveToday(name){
  const idx=EMPLOYEES.indexOf(name), ts=todayState[name]||{};
  [['mi','in'],['mo','out'],['ms','otStart'],['me','otEnd']].forEach(([p,k])=>{
    const v=document.getElementById(`${p}-${idx}`)?.value; if(v) ts[k]=v;
  });
  const note=document.getElementById(`note-${idx}`)?.value.trim()||'';
  const td=today();
  const d =calcDurObj(ts.in,ts.out);
  const od=calcOtObj(ts.otStart,ts.otEnd);
  db.ref(`attendance/${nameKey(name)}/${td}`).set({
    date:td, name,
    in:ts.in||'', out:ts.out||'',
    otStart:ts.otStart||'', otEnd:ts.otEnd||'',
    duration:   durStr(d),
    otDuration: durStr(od),
    lunchDeducted: (d!=null),
    note, updatedAt: new Date().toISOString()
  }).then(()=>showToast(`💾 ${name} 今日紀錄已儲存`))
    .catch(e=>{ showToast('❌ 儲存失敗：'+e.message); setSync('error'); });
  setSync('syncing');
}

function delAttend(name, date){
  if(!confirm(`確定刪除 ${name} 的 ${date} 紀錄？`)) return;
  db.ref(`attendance/${nameKey(name)}/${date}`).remove()
    .then(()=>showToast('🗑 已刪除')).catch(()=>showToast('❌ 刪除失敗'));
}

function submitLeave(name){
  const idx=EMPLOYEES.indexOf(name);
  const type=document.getElementById(`lt-${idx}`)?.value||'other';
  const half=document.getElementById(`lh-${idx}`)?.value||'full';
  const from=document.getElementById(`lf-${idx}`)?.value;
  const to  =document.getElementById(`lo-${idx}`)?.value;
  const reason = document.getElementById(`ln-reason-${idx}`)?.value.trim()||'';
  const agent  = document.getElementById(`ln-agent-${idx}`)?.value.trim()||'';
  const tasks  = document.getElementById(`ln-tasks-${idx}`)?.value.trim()||'';
  const note   = reason;
  if(!_firebaseOk||!db){ showToast('❌ Firebase 未連線，請重新整理頁面'); return; }
  if(!from||!to){ showToast('⚠️ 請選擇日期'); return; }
  if(to<from){ showToast('⚠️ 結束日期不可早於開始日期'); return; }
  const leaveId='lv_'+Date.now();
  db.ref(`leaves/${nameKey(name)}/${leaveId}`).set({
    leaveId, name, type, half, from, to, reason, agent, tasks, note,
    days: leaveDaysFromType(half, ldays(from,to)),
    status:'pending', createdAt: new Date().toISOString()
  }).then(()=>{
    document.getElementById(`ln-reason-${idx}`).value='';
    document.getElementById(`ln-agent-${idx}`).value='';
    document.getElementById(`ln-tasks-${idx}`).value='';
    showToast('📋 請假申請已送出，等待主管審核');
  }).catch(()=>showToast('❌ 送出失敗'));
}

function delLeave(name, leaveId){
  if(!confirm('確定撤回此請假申請？')) return;
  db.ref(`leaves/${nameKey(name)}/${leaveId}`).remove()
    .then(()=>showToast('🗑 已撤回')).catch(()=>showToast('❌ 撤回失敗'));
}

function drawTeam(allLeaves){
  const td=today();
  const fd=document.getElementById('team-date')?.value||td;
  const ft=document.getElementById('team-type')?.value||'';

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div><h2 style="font-size:18px;font-weight:700;margin-bottom:3px">👥 同仁請假總覽</h2>
         <p style="font-size:12px;color:var(--ink2)">資料即時同步 · 核准及待審請假一覽</p></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <input type="date" id="team-date" value="${fd}" onchange="teamFilter()" style="width:auto">
      <select id="team-type" onchange="teamFilter()" style="width:auto">
        <option value="">所有假別</option>
        ${LEAVE_TYPES.map(t=>`<option value="${t.id}"${ft===t.id?' selected':''}>${t.emoji} ${t.label}</option>`).join('')}
      </select>
    </div>
  </div><div class="team-grid">`;

  EMPLOYEES.forEach((name,i)=>{
    const color=COLORS[i];
    const empLeaves=Object.values(allLeaves[nameKey(name)]||{})
      .filter(l=>(l.status==='approved'||l.status==='pending'))
      .filter(l=>!ft||l.type===ft)
      .filter(l=>!fd||(l.from<=fd&&l.to>=fd))
      .sort((a,b)=>a.from.localeCompare(b.from));
    const appDays=empLeaves.filter(l=>l.status==='approved').reduce((s,l)=>s+leaveDaysFromType(l.half, ldays(l.from,l.to)),0);
    const pendN=empLeaves.filter(l=>l.status==='pending').length;
    html+=`<div class="team-card"><div class="team-head">
      <div class="team-av" style="background:linear-gradient(135deg,${color},${lighten(color)})">${name[0]}</div>
      <div><div style="font-size:14px;font-weight:700">${name}</div>
           <div style="font-size:11px;color:var(--ink2);margin-top:1px">${appDays>0?`已核准 ${appDays} 天`:''}${pendN>0?` · ${pendN} 筆待審`:''}${!appDays&&!pendN?'無請假紀錄':''}</div></div>
    </div>`;
    if(!empLeaves.length){ html+=`<div style="font-size:12px;color:var(--ink3);text-align:center;padding:10px 0">此期間無請假</div>`; }
    else empLeaves.slice(0,4).forEach(lv=>{
      const info=ltInfo(lv.type), dayStr=lv.half&&lv.half!=='full'?'半天':ldays(lv.from,lv.to)+'天';
      html+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:16px">${info.emoji}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
            <span class="leave-tag leave-tag-${info.id}" style="font-size:11px">${info.label}</span>
            <span style="font-size:11px;color:var(--ink2);font-family:'JetBrains Mono',monospace">${dayStr}</span>
          </div>
          <div style="font-size:11px;color:var(--ink3);font-family:'JetBrains Mono',monospace;margin-top:2px">\${lv.from}\${lv.from!==lv.to?' ～ '+lv.to:''}</div>
          \${lv.reason?`<div style="font-size:11px;color:var(--ink2);margin-top:2px">📝 \${lv.reason}</div>`:''}
          \${lv.agent?`<div style="font-size:11px;color:var(--ink2)">👤 代理：\${lv.agent}</div>`:''}
          ${lv.reason?`<div style="font-size:11px;color:var(--ink2);margin-top:2px">📝 ${lv.reason}</div>`:''}
          ${lv.agent?`<div style="font-size:11px;color:var(--ink2)">👤 代理：${lv.agent}</div>`:''}
        </div>
        <span class="status-pill ${lv.status==='approved'?'sp-approved':'sp-pending'}" style="font-size:10px">${lv.status==='approved'?'核准':'待審'}</span>
      </div>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;

  // 14天日曆
  html+=`<div class="today-card"><div class="card-title">未來 14 天請假行事曆</div><div style="overflow-x:auto"><table style="min-width:500px">
    <thead><tr><th>日期</th><th>請假人員</th></tr></thead><tbody>`;
  for(let d=0;d<14;d++){
    const dt=new Date(); dt.setDate(dt.getDate()+d);
    const ds=dt.toISOString().slice(0,10);
    const onLeave=[];
    EMPLOYEES.forEach((name,i)=>{
      Object.values(allLeaves[nameKey(name)]||{})
        .filter(l=>(l.status==='approved'||l.status==='pending')&&l.from<=ds&&l.to>=ds&&(!ft||l.type===ft))
        .forEach(lv=>{
          const info=ltInfo(lv.type), hl={full:'',am:'上午',pm:'下午'}[lv.half||'full'];
          onLeave.push({name,color:COLORS[i],info,hl,isApp:lv.status==='approved'});
        });
    });
    const isToday=ds===td;
    html+=`<tr ${isToday?'style="background:#fffbe6"':''}>
      <td style="white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px">${ds}<br>
          <span style="font-size:10px;color:var(--ink3)">星期${WDS[dt.getDay()]}${isToday?' 今天':''}</span></td>
      <td>${!onLeave.length?`<span style="color:var(--ink3);font-size:12px">—</span>`:
        onLeave.map(o=>`<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0">
          <span style="width:7px;height:7px;border-radius:50%;background:${o.color};display:inline-block"></span>
          <span style="font-size:12px;font-weight:600">${o.name}</span>
          <span class="leave-tag leave-tag-${o.info.id}" style="font-size:10px;padding:1px 7px">${o.info.label}${o.hl?'·'+o.hl:''}</span>
          ${!o.isApp?'<span style="font-size:10px;color:#b45309">待審</span>':''}
        </span>`).join('')}</td>
    </tr>`;
  }
  html+=`</tbody></table></div></div>`;
  document.getElementById('main').innerHTML=html;
  window._teamLeaves=allLeaves;
}

function hrDrawAttend(){
  const emp=document.getElementById('f-emp')?.value||'';

  const to  =document.getElementById('f-to')?.value||'';
  const td  =today();
  let rows=[];
  EMPLOYEES.filter(n=>!emp||n===emp).forEach(name=>{
    Object.values((window._hrAttend||{})[nameKey(name)]||{}).forEach(r=>{
      if(from&&r.date<from)return; if(to&&r.date>to)return;
      rows.push({...r,name});
    });
  });
  rows.sort((a,b)=>b.date.localeCompare(a.date)||EMPLOYEES.indexOf(a.name)-EMPLOYEES.indexOf(b.name));

  const te=emp?[emp]:EMPLOYEES;
  const todayRows=rows.filter(r=>r.date===td);

function hrDrawLeave(){

  let rows=[];

      rows.push({...lv,name});
    });

  rows.sort((a,b)=>{
    const sp={pending:0,approved:1,rejected:2};
    return (sp[a.status||'pending']||0)-(sp[b.status||'pending']||0)||b.from.localeCompare(a.from);
  });

    <div class="hr-stat" style="border-color:#fde68a"><div class="hr-stat-val" style="color:#b45309">${pending}</div><div class="hr-stat-lbl">待主管審核</div></div>
    <div class="hr-stat" style="border-color:#9dd9e6"><div class="hr-stat-val" style="color:var(--teal)">${approved}</div><div class="hr-stat-lbl">已核准</div></div>
    <div class="hr-stat"><div class="hr-stat-val">${totalDays}</div><div class="hr-stat-lbl">核准天數合計</div></div>`;

  tbody.innerHTML=rows.map(r=>{
    const color=COLORS[EMPLOYEES.indexOf(r.name)], info=ltInfo(r.type);
    const days=ldays(r.from,r.to), dayStr=leaveDisplayStr(r.half, days);
    const hl=leaveHalfLabel(r.half||'full');
    const sc={pending:'sp-pending',approved:'sp-approved',rejected:'sp-rejected'};
    const sl={pending:'⏳ 待審核',approved:'✅ 已核准',rejected:'❌ 不核准'};
    const created=r.createdAt?new Date(r.createdAt).toLocaleDateString('zh-TW'):'—';
    return `<tr ${r.status==='pending'?'style="background:#fffbe6"':''}>
      <td><div class="emp-chip"><div class="chip-dot" style="background:${color}"></div>${r.name}</div></td>
      <td><span class="leave-tag leave-tag-${info.id}">${info.emoji} ${info.label}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${r.from}</td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:12px">${r.to}${hl}</td>
      <td><span class="badge badge-lv">${dayStr}</span></td>
      <td><span class="status-pill ${sc[r.status||'pending']}">${sl[r.status||'pending']}</span></td>
      <td style="font-size:11px;color:var(--ink2)">${created}</td>
      <td style="min-width:160px;max-width:220px;font-size:12px;line-height:1.6">
        \${r.reason?`<div><span style="color:var(--ink3);font-size:10px">事由</span> \${r.reason}</div>`:''}
        \${r.agent?`<div><span style="color:var(--ink3);font-size:10px">代理</span> \${r.agent}</div>`:''}
        \${r.tasks?`<div style="white-space:pre-wrap"><span style="color:var(--ink3);font-size:10px">交辦</span> \${r.tasks}</div>`:''}
        \${!r.reason&&!r.agent&&!r.tasks?'<span style="color:var(--ink3)">—</span>':''}
      </td>
      <td style="white-space:nowrap">
        ${r.status!=='approved'?`<button class="btn-approve" onclick="setLeaveStatus('${r.name}','${r.leaveId}','approved')">✅ 核准</button>`:''}
        ${r.status!=='rejected'?`<button class="btn-reject"  onclick="promptReject('${r.name}','${r.leaveId}')">❌ 否准</button>`:''}
        ${r.status!=='pending' ?`<button class="btn-reset"   onclick="setLeaveStatus('${r.name}','${r.leaveId}','pending')">↩</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function setLeaveStatus(name, leaveId, status, reason=''){
  db.ref(`leaves/${nameKey(name)}/${leaveId}`).update({
    status, rejectReason: status==='rejected'?reason:'', updatedAt: new Date().toISOString()
  }).then(()=>showToast({approved:'✅ 已核准',rejected:'❌ 已否准',pending:'↩ 已重設'}[status]))
    .catch(()=>showToast('❌ 操作失敗'));
}

function promptReject(name, leaveId){
  const reason=prompt(`否准 ${name} 的請假，請輸入原因（可留空）：`);
  if(reason===null) return;
  setLeaveStatus(name, leaveId, 'rejected', reason);
}

function drawStats(){
  const allLeaves=window._hrLeaves||{};
  let html=`<div style="font-size:13px;color:var(--ink2);margin-bottom:14px">統計各員工核准請假天數（半天計 0.5 天）</div>
    <div class="hr-table-wrap"><table>
    <thead><tr><th>員工</th>${LEAVE_TYPES.map(t=>`<th>${t.emoji} ${t.label}</th>`).join('')}<th>合計</th></tr></thead><tbody>`;
  EMPLOYEES.forEach((name,i)=>{
    const color=COLORS[i];
    const leaves=Object.values(allLeaves[nameKey(name)]||{}).filter(l=>l.status==='approved');
    const counts={};
    LEAVE_TYPES.forEach(t=>{ counts[t.id]=leaves.filter(l=>l.type===t.id).reduce((s,l)=>s+leaveDaysFromType(l.half, ldays(l.from,l.to)),0); });
    const total=Object.values(counts).reduce((s,v)=>s+v,0);
    html+=`<tr><td><div class="emp-chip"><div class="chip-dot" style="background:${color}"></div>${name}</div></td>
      ${LEAVE_TYPES.map(t=>`<td style="text-align:center"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:${counts[t.id]>0?'var(--teal)':'var(--ink3)'}">${counts[t.id]>0?counts[t.id]:'—'}</span></td>`).join('')}
      <td style="text-align:center"><span class="badge badge-lv">${total}</span></td></tr>`;
  });
  html+=`</tbody></table></div>`;
  document.getElementById('sec-st').innerHTML=html;
}

// ════════════════════════════════════════════════════
//  CSV 匯出
// ════════════════════════════════════════════════════
function exportAttenCSV(){
  const emp=document.getElementById('f-emp')?.value||'';
  const from=document.getElementById('f-from')?.value||'';
  const to=document.getElementById('f-to')?.value||'';
  let rows=[];
  EMPLOYEES.filter(n=>!emp||n===emp).forEach(name=>{
    Object.values((window._hrAttend||{})[nameKey(name)]||{}).forEach(r=>{
      if(from&&r.date<from)return; if(to&&r.date>to)return;
      rows.push({...r,name});
    });
  });
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  const lines=[['員工姓名','日期','上班','下班','實際工時(扣午休)','加班開始','加班結束','加班時數','備註'].join(',')];
  rows.forEach(r=>{
    const d=calcDurObj(r.in,r.out), od=calcOtObj(r.otStart,r.otEnd);
    lines.push([r.name,r.date,r.in||'',r.out||'',durStr(d),r.otStart||'',r.otEnd||'',durStr(od),`"${(r.note||'').replace(/"/g,'""')}"`].join(','));
  });
  dlCSV(lines,'出勤紀錄.csv');
}

function exportLeaveCSV(){
  let rows=[];
  EMPLOYEES.forEach(name=>{ Object.values((window._hrLeaves||{})[nameKey(name)]||{}).forEach(lv=>rows.push({...lv,name})); });
  rows.sort((a,b)=>b.from.localeCompare(a.from));
  const lines=[['員工姓名','假別','開始日期','結束日期','天數','狀態','申請時間','請假事由','代理人','交辦事項'].join(',')];
  rows.forEach(r=>{
    const info=ltInfo(r.type), days=r.half&&r.half!=='full'?'半天':ldays(r.from,r.to)+'天';
    const sl={pending:'待審',approved:'核准',rejected:'不核准'}[r.status||'pending'];
    lines.push([
      r.name, info.label, r.from, r.to, days, sl,
      r.createdAt ? new Date(r.createdAt).toLocaleDateString('zh-TW') : '',
      `"${(r.reason||r.note||'').replace(/"/g,'""')}"`,
      `"${(r.agent||'').replace(/"/g,'""')}"`,
      `"${(r.tasks||'').replace(/"/g,'""')}"`
    ].join(','));
  });
  dlCSV(lines,'請假紀錄.csv');
}

function dlCSV(lines, filename){
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();
  showToast('⬇ '+filename+' 已匯出');
}

// ════════════════════════════════════════════════════
//  Toast
// ════════════════════════════════════════════════════
let _tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2800);
}

// ─── 自訂時數 UI ───────────────────────────────────────────
function toggleCustomHours(idx) {
  const sel = document.getElementById('lh-'+idx);
  const wrap = document.getElementById('custom-h-wrap-'+idx);
  if (!wrap) return;
  if (sel.value === 'custom') {
    wrap.style.display = 'block';
    document.getElementById('custom-h-'+idx).focus();
  } else {
    wrap.style.display = 'none';
  }
}

function validateCustomH(inp) {
  const idx = inp.id.replace('custom-h-','');
  let v = parseFloat(inp.value);
  const daysEl = document.getElementById('custom-h-days-'+idx);
  if (isNaN(v) || v <= 0) { if(daysEl) daysEl.textContent=''; return; }
  // Round to nearest 0.5
  v = Math.round(v * 2) / 2;
  v = Math.min(7.5, Math.max(0.5, v));
  const days = (v / 8).toFixed(4).replace(/\.?0+$/, '');
  if (daysEl) daysEl.textContent = '≈ ' + days + ' 天';
}
