<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司出勤管理系統</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f4f0;--s:#fff;--s2:#f0efe9;--bd:#dddbd2;--ink:#1a1916;--ink2:#6b6860;--ink3:#a8a69e;--ac:#c8402a;--acl:#fdf2f0;--gr:#1e7d5a;--grl:#edf7f3;--or:#d4750a;--orl:#fdf6ec;--bl:#2456a4;--bll:#eef3fb;--pu:#7c3aed;--pul:#f3f0ff;--te:#0f7490;--tel:#ecfafd;--ro:#be185d;--rol:#fdf2f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Noto Sans TC',sans-serif;min-height:100vh}
nav{background:var(--ink);color:#fff;display:flex;align-items:center;padding:0 20px;height:54px;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:900;display:flex;align-items:center;gap:8px}
.logo span{font-size:10px;font-weight:400;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;padding-left:8px;border-left:1px solid rgba(255,255,255,.15)}
#clk{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:14px;color:rgba(255,255,255,.6)}
.sync{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.55);padding:3px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.15)}
.dot{width:7px;height:7px;border-radius:50%;background:#6b7280}
.dot.ok{background:#4ade80}.dot.err{background:#f87171}.dot.spin{background:#fbbf24;animation:bl .7s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.tabs{background:var(--s);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tb{padding:12px 13px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-bottom:-1px;flex-shrink:0}
.tb:hover{color:var(--ink)}.tb.act{color:var(--ac);border-bottom-color:var(--ac);font-weight:700}
.tsp{margin-left:auto;border:1px solid var(--bd);border-radius:7px;margin-bottom:0;padding:6px 12px;font-size:12px;font-weight:600}
.tte{color:var(--te)}.tte:hover{background:var(--tel)}.tte.act{background:var(--te);color:#fff;border-color:var(--te)}
.thr{color:var(--bl)}.thr:hover{background:var(--bll)}.thr.act{background:var(--bl);color:#fff;border-color:var(--bl)}
main{padding:22px 20px 60px;max-width:880px;margin:0 auto}
.eh{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.ei h2{font-size:18px;font-weight:700}.ei p{font-size:12px;color:var(--ink2);margin-top:2px}
.card{background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:20px;margin-bottom:16px}
.ct{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ct::after{content:'';flex:1;height:1px;background:var(--bd)}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.ps{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.pl{font-size:11px;color:var(--ink2);margin-bottom:4px;font-weight:500}
.pv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:600;color:var(--ink3);transition:color .2s}
.pv.in{color:var(--gr)}.pv.out{color:var(--or)}.pv.ot{color:var(--pu)}
.pm{font-size:11px;color:var(--ink3);margin-top:3px}
.dr{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--bl);background:var(--bll);border:1px solid #c8d8f0;border-radius:20px;padding:3px 12px;margin-bottom:14px}
.bp{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.btn{padding:9px 12px;border:none;border-radius:9px;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s}
.btn:active{transform:scale(.97)}
.bi{background:var(--grl);color:var(--gr);border:1px solid #b3dccb}.bi:hover{background:#d5eee5}
.bo{background:var(--orl);color:var(--or);border:1px solid #f0ceaa}.bo:hover{background:#faecd5}
.bsf{background:var(--ink);color:#fff;width:100%;padding:10px}.bsf:hover{background:#333}
.mr{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
.fl label{font-size:11px;color:var(--ink2);font-weight:500;display:block;margin-bottom:4px}
input[type=time],input[type=date],textarea,select{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:7px 10px;outline:none;transition:border-color .15s}
input[type=time]{font-family:'JetBrains Mono',monospace}
input:focus,textarea:focus,select:focus{border-color:var(--te)}
textarea{resize:none;line-height:1.6}textarea::placeholder{color:var(--ink3)}select{cursor:pointer}
.hi{display:flex;align-items:start;gap:10px;padding:11px 0;border-bottom:1px solid var(--bd)}
.hi:last-child{border-bottom:none}
.hd{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.hdate{font-size:13px;font-weight:600;margin-bottom:3px}
.ht{display:flex;gap:12px;flex-wrap:wrap;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2)}
.ti{color:var(--gr);font-weight:600}.to{color:var(--or);font-weight:600}
.hn{font-size:12px;color:var(--ink2);margin-top:4px;background:var(--s2);border-radius:5px;padding:4px 8px;white-space:pre-wrap}
.bd{background:none;border:none;color:var(--ink3);cursor:pointer;padding:3px 5px;border-radius:5px;font-size:13px;margin-left:auto;flex-shrink:0;line-height:1}
.bd:hover{color:var(--ac);background:var(--acl)}
.em{text-align:center;color:var(--ink3);font-size:13px;padding:22px 0}
.li{display:flex;align-items:start;gap:10px;padding:11px 0;border-bottom:1px solid var(--bd)}
.li:last-child{border-bottom:none}
.ltg{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px}
.annual{background:var(--tel);color:var(--te)}.sick{background:#fff3e0;color:#b45309}
.personal{background:var(--bll);color:var(--bl)}.comp{background:var(--pul);color:var(--pu)}
.marriage{background:var(--rol);color:var(--ro)}.funeral{background:#f3f4f6;color:#374151}
.other{background:var(--s2);color:var(--ink2)}
.db{font-size:11px;font-weight:700;background:var(--tel);color:var(--te);border-radius:20px;padding:2px 7px;margin-left:4px}
.ldr{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink2);margin-top:3px}
.sp{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.sp-p{background:#fff3e0;color:#b45309}.sp-a{background:var(--grl);color:var(--gr)}.sp-r{background:var(--acl);color:var(--ac)}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-bottom:18px}
.tc{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:16px;transition:border-color .2s}
.tc:hover{border-color:var(--te)}
.th2{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.av2{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.hrb{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.hrb>div label{font-size:11px;color:var(--ink2);font-weight:500;display:block;margin-bottom:3px}
.hrb select,.hrb input[type=date]{width:auto;min-width:100px}
.ex{background:var(--gr);color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:12px;font-weight:600;font-family:'Noto Sans TC',sans-serif;cursor:pointer;white-space:nowrap}
.ex:hover{background:#165f44}
.hs{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:18px}
.hsc{background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:12px 14px}
.hsv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--ink)}.hsl{font-size:11px;color:var(--ink2);margin-top:2px}
.tw{background:var(--s);border:1px solid var(--bd);border-radius:14px;overflow:hidden;overflow-x:auto}
.hst{display:flex;gap:3px;margin-bottom:18px;border-bottom:1px solid var(--bd)}
.hstb{padding:8px 14px;font-size:13px;font-weight:500;color:var(--ink2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s;margin-bottom:-1px}
.hstb:hover{color:var(--ink)}.hstb.act{color:var(--te);border-bottom-color:var(--te);font-weight:700}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:560px}
thead{background:var(--s2);border-bottom:1px solid var(--bd)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--s2)}
.ec{display:inline-flex;align-items:center;gap:5px;font-weight:600}
.cd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.bg{font-size:11px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;font-weight:600}
.bgi{background:var(--grl);color:var(--gr)}.bgo{background:var(--orl);color:var(--or)}
.bgd{background:var(--bll);color:var(--bl)}.bgm{background:#fdf0f0;color:#c0392b}
.bgt{background:var(--pul);color:var(--pu)}.bgl{background:var(--tel);color:var(--te)}
.nc{max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink2);font-size:12px}
.bap{padding:3px 8px;font-size:11px;background:var(--grl);color:var(--gr);border:1px solid #b3dccb;border-radius:6px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;margin-right:3px}
.brj{padding:3px 8px;font-size:11px;background:var(--acl);color:var(--ac);border:1px solid #f5c4bc;border-radius:6px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600}
.brs{padding:3px 8px;font-size:11px;background:var(--s2);color:var(--ink2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600;margin-left:3px}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:200}
.md{background:var(--s);border-radius:14px;padding:28px;width:310px}
.md h3{font-size:16px;font-weight:700;margin-bottom:6px}.md p{font-size:13px;color:var(--ink2);margin-bottom:16px}
.md input[type=password]{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);font-size:16px;letter-spacing:.2em;padding:10px 12px;outline:none;margin-bottom:10px}
.md input[type=password]:focus{border-color:var(--ac)}
.mdb{display:flex;gap:9px}
.mc{flex:1;padding:9px;border:1px solid var(--bd);background:none;border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;color:var(--ink2)}
.mo{flex:1;padding:9px;background:var(--ink);color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:600}
.me{font-size:12px;color:var(--ac);margin-bottom:8px;display:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px);background:var(--ink);color:#fff;border-radius:9px;padding:9px 16px;font-size:13px;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.pd{display:inline-block;width:7px;height:7px;background:var(--or);border-radius:50%;margin-left:4px;vertical-align:middle}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.fi{animation:fi .2s ease}
@media(max-width:580px){main{padding:16px 12px 60px}.tabs{padding:0 12px}.pg,.mr{grid-template-columns:1fr}.hs{grid-template-columns:1fr 1fr}.tg{grid-template-columns:1fr}nav{padding:0 12px}}
</style>
</head>
<body>
<nav>
  <div class="logo">⏺ 出勤管理<span>Attendance System</span></div>
  <div class="sync"><div class="dot spin" id="dot"></div><span id="sl">連線中…</span></div>
  <button onclick="logout()" id="logout-btn" style="display:none;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:5px 12px;font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,.2)'" onmouseout="this.style.background='rgba(255,255,255,.1)'">🏠 回首頁</button>
  <div id="clk">00:00:00</div>
</nav>
<div class="tabs" id="tabs">
  <button class="tb tsp tte" id="ttb" onclick="showTeam()">👥 同仁請假總覽</button>
  <button class="tb tsp thr" id="htb" onclick="openHR()">🔐 HR 主管</button>
</div>
<main id="main"></main>
<div class="mb" id="hrm" style="display:none">
  <div class="md">
    <h3>🔐 主管 / HR 登入</h3>
    <p>請輸入密碼以進入簽核介面</p>
    <input type="password" id="pw" placeholder="••••" onkeydown="if(event.key==='Enter')chkPw()">
    <div class="me" id="pwe">密碼錯誤，請再試一次</div>
    <div class="mdb">
      <button class="mc" onclick="closeHR()">取消</button>
      <button class="mo" onclick="chkPw()">進入</button>
    </div>
  </div>
</div>
<div class="mb" id="empm" style="display:none">
  <div class="md">
    <h3 id="empm-title">👤 員工登入</h3>
    <p id="empm-sub">請輸入你的個人密碼</p>
    <input type="password" id="epw" placeholder="••••" onkeydown="if(event.key==='Enter')chkEPw()">
    <div class="me" id="epwe">密碼錯誤，請再試一次</div>
    <div class="mdb">
      <button class="mc" onclick="closeEmp()">取消</button>
      <button class="mo" onclick="chkEPw()">登入</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  Firebase 設定
// ══════════════════════════════════════════════════
const FB = {
  apiKey:"AIzaSyCP_tx_SU0I-c44Z88RDfsASLHi8zy6BQ4",
  authDomain:"attendance-management-613a6.firebaseapp.com",
  databaseURL:"https://attendance-management-613a6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"attendance-management-613a6",
  storageBucket:"attendance-management-613a6.firebasestorage.app",
  messagingSenderId:"189554042903",
  appId:"1:189554042903:web:2bdad6f0c334ff70319452"
};
firebase.initializeApp(FB);
const db = firebase.database();

// ══════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════
const EMPS = ['郭宗銘','劉芝杏','陳碧真','黃美瑛','黃玉珠','蘇怡娟','黃信恆'];
const CLR  = ['#c8402a','#2456a4','#1e7d5a','#8b3db8','#d4750a','#b5386e','#2e7d9a'];
const HRPW = '1234';

// 員工登入密碼（可自行修改）
const EMP_PW = {
  '郭宗銘': '0001',
  '劉芝杏': '0002',
  '陳碧真': '0003',
  '黃美瑛': '0004',
  '黃玉珠': '0005',
  '蘇怡娟': '0006',
  '黃信恆': '0007',
};
const WDS  = ['日','一','二','三','四','五','六'];
const LTS  = [
  {id:'annual',l:'特休假',e:'🌴'},{id:'sick',l:'病假',e:'🤒'},
  {id:'personal',l:'事假',e:'📋'},{id:'comp',l:'補休',e:'🔄'},
  {id:'marriage',l:'婚假',e:'💍'},{id:'funeral',l:'喪假',e:'🕯️'},
  {id:'other',l:'其他',e:'📌'}
];
const LUNCH_S = 12*60, LUNCH_E = 13*60+30;

// ══════════════════════════════════════════════════
//  狀態
// ══════════════════════════════════════════════════
let curTab=0, hrOk=false, ts={}, loginUser=null;
let refs=[];

// ══════════════════════════════════════════════════
//  工具
// ══════════════════════════════════════════════════
const td = ()=> new Date().toISOString().slice(0,10);
const nk = n => n.replace(/[.#$[\]]/g,'_');
const lti = id => LTS.find(t=>t.id===id)||LTS[6];
const ld = (f,t)=>{ if(!f||!t)return 0; return Math.max(0,Math.round((new Date(t)-new Date(f))/86400000)+1); };
const toM = t=>{ if(!t)return null; const[h,m]=t.split(':').map(Number); return h*60+m; };
const lg = n => '#'+n.replace(/^#/,'').match(/.{2}/g).map(c=>Math.min(255,parseInt(c,16)+60).toString(16).padStart(2,'0')).join('');

function dur(a,b,lunch=false){
  const ai=toM(a),bi=toM(b);
  if(ai==null||bi==null||bi<=ai)return null;
  let m=bi-ai;
  if(lunch){ const os=Math.max(ai,LUNCH_S),oe=Math.min(bi,LUNCH_E); if(oe>os)m-=(oe-os); }
  if(m<=0)return null;
  return{h:Math.floor(m/60),m:m%60,total:m};
}
function ldays(half,dc,ch){
  if(!half||half==='full')return dc;
  if(half==='half_am'||half==='half_pm')return dc*0.5;
  if(half==='custom'){ const h=parseFloat(ch); return isNaN(h)?0:parseFloat((Math.min(7.5,Math.max(0.5,Math.round(h*2)/2))/8).toFixed(4)); }
  const m=half.match(/^([\d.]+)h$/); if(m)return parseFloat((parseFloat(m[1])/8).toFixed(4));
  return dc;
}
function ldstr(half,dc,ch){
  if(!half||half==='full')return dc+'天';
  if(half==='half_am')return '上午半天';
  if(half==='half_pm')return '下午半天';
  if(half==='custom'){ const h=parseFloat(ch)||0; return h===0.5?'30分鐘':h+'小時'; }
  const m=half.match(/^([\d.]+)h$/); if(m){ const h=parseFloat(m[1]); return h===0.5?'30分鐘':h+'小時'; }
  return dc+'天';
}
function lhl(half,ch){
  if(!half||half==='full')return '';
  if(half==='half_am')return ' (上午半天)';
  if(half==='half_pm')return ' (下午半天)';
  if(half==='custom'){ const h=parseFloat(ch)||0; return ' ('+(h===0.5?'30分鐘':h+'小時')+')'; }
  const m=half.match(/^([\d.]+)h$/); if(m){ const h=parseFloat(m[1]); return ' ('+(h===0.5?'30分鐘':h+'小時')+')'; }
  return '';
}
function fmtD(d){ const o=new Date(d+'T00:00:00'); return `${d}（星期${WDS[o.getDay()]}）`; }

// ══════════════════════════════════════════════════
//  同步狀態
// ══════════════════════════════════════════════════
function sync(s){
  const d=document.getElementById('dot'),l=document.getElementById('sl');
  if(!d)return;
  d.className='dot'+(s==='ok'?' ok':s==='err'?' err':' spin');
  l.textContent={ok:'即時同步中 ✓',spin:'連線中…',err:'連線失敗'}[s]||'連線中…';
}

// ══════════════════════════════════════════════════
//  時鐘
// ══════════════════════════════════════════════════
setInterval(()=>{ const e=document.getElementById('clk'); if(e)e.textContent=new Date().toLocaleTimeString('zh-TW',{hour12:false}); },1000);

// ══════════════════════════════════════════════════
//  分頁
// ══════════════════════════════════════════════════
function buildTabs(){
  const bar=document.getElementById('tabs');
  bar.querySelectorAll('.etb').forEach(e=>e.remove());
  const ttb=document.getElementById('ttb');
  EMPS.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='tb etb'+(i===curTab&&!hrOk?' act':'');
    b.textContent=name; b.onclick=()=>go(i);
    bar.insertBefore(b,ttb);
  });
  updPD();
}
function go(i){
  const name=EMPS[i];
  // HR can access all; logged-in employee can only access own tab
  if(!hrOk && loginUser !== name){
    openEmpLogin(name);
    return;
  }
  stopLive(); curTab=i; hrOk=false; buildTabs();
  document.getElementById('htb').classList.remove('act');
  document.getElementById('ttb').classList.remove('act');
  renderEmp(name);
}

function updPD(){
  db.ref('leaves').once('value').then(s=>{
    const all=s.val()||{};
    const has=Object.values(all).some(e=>Object.values(e||{}).some(l=>l.status==='pending'));
    const b=document.getElementById('htb');
    let p=b.querySelector('.pd');
    if(has&&!p){p=document.createElement('span');p.className='pd';b.appendChild(p);}
    if(!has&&p)p.remove();
  });
}

// ══════════════════════════════════════════════════
//  補打特定日期
// ══════════════════════════════════════════════════
function loadDate(name, date){
  const idx=EMPS.indexOf(name);
  const today=td();
  // Reset form fields
  if(!ts[name])ts[name]={in:'',out:'',ots:'',ote:''};
  ts[name]={in:'',out:'',ots:'',ote:''};

  // If today, restore from current ts
  // Load from Firebase for that date
  db.ref(`attendance/${nk(name)}/${date}`).once('value').then(s=>{
    const r=s.val()||{};
    ts[name]={in:r.in||'',out:r.out||'',ots:r.ots||'',ote:r.ote||''};
    const t=ts[name];
    // Update display
    const pv={in:`pi-${idx}`,out:`po-${idx}`,ots:`ps-${idx}`,ote:`pe-${idx}`};
    const pm={in:`pm-${idx}`,out:`pmo-${idx}`,ots:`pms-${idx}`,ote:`pme-${idx}`};
    const im={in:`mi-${idx}`,out:`mo-${idx}`,ots:`ms-${idx}`,ote:`me-${idx}`};
    const cm={in:' in',out:' out',ots:' ot',ote:' ot'};
    Object.keys(pv).forEach(k=>{
      const el=document.getElementById(pv[k]),meta=document.getElementById(pm[k]),inp=document.getElementById(im[k]);
      if(el){el.textContent=t[k]||'--:--';el.className='pv'+(t[k]?cm[k]:'');}
      if(meta)meta.textContent=t[k]?'✓ 已有紀錄':'';
      if(inp)inp.value=t[k]||'';
    });
    // Update note
    const nt=document.getElementById(`nt-${idx}`);
    if(nt)nt.value=r.note||'';
    // Update save button label
    const isToday=date===today;
    const btn=document.querySelector(`button[onclick="save('${name}')"]`);
    if(btn)btn.textContent=isToday?'💾 儲存今日出勤':`💾 儲存 ${date} 的紀錄`;
    if(r.in||r.out){
      toast(`📋 已載入 ${date} 的紀錄`);
    } else {
      toast(`📋 ${date} 尚無紀錄，可新增`);
    }
  });
}

// ══════════════════════════════════════════════════
//  打卡
// ══════════════════════════════════════════════════
function punch(name,type){
  const now=new Date(), t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!ts[name])ts[name]={in:'',out:'',ots:'',ote:''};
  ts[name][type]=t;
  const idx=EMPS.indexOf(name);
  const dm={in:`pi-${idx}`,out:`po-${idx}`,ots:`ps-${idx}`,ote:`pe-${idx}`};
  const mm={in:`pm-${idx}`,out:`pmo-${idx}`,ots:`pms-${idx}`,ote:`pme-${idx}`};
  const im={in:`mi-${idx}`,out:`mo-${idx}`,ots:`ms-${idx}`,ote:`me-${idx}`};
  const cm={in:' in',out:' out',ots:' ot',ote:' ot'};
  const lm={in:'上班',out:'下班',ots:'加班開始',ote:'加班結束'};
  const el=document.getElementById(dm[type]),meta=document.getElementById(mm[type]),inp=document.getElementById(im[type]);
  if(el){el.textContent=t;el.className='pv'+cm[type];}
  if(meta)meta.textContent='✓ 已打卡';
  if(inp)inp.value=t;
  toast(`✅ ${name} ${lm[type]} ${t}`);
}
function ms(name,type,val){ if(!ts[name])ts[name]={in:'',out:'',ots:'',ote:''}; ts[name][type]=val; }

async function save(name){
  const idx=EMPS.indexOf(name), t=ts[name]||{};
  const flds=[['mi','in'],['mo','out'],['ms','ots'],['me','ote']];
  flds.forEach(([p,k])=>{ const v=document.getElementById(`${p}-${idx}`)?.value; if(v)t[k]=v; });
  const note=document.getElementById(`nt-${idx}`)?.value.trim()||'';
  const saveDate=document.getElementById(`rd-${idx}`)?.value||td();
  const d=dur(t.in,t.out,true), od=dur(t.ots,t.ote);
  try{
    await db.ref(`attendance/${nk(name)}/${saveDate}`).set({
      date:saveDate,name,in:t.in||'',out:t.out||'',ots:t.ots||'',ote:t.ote||'',
      duration:d?`${d.h}h${d.m}m`:'',otDuration:od?`${od.h}h${od.m}m`:'',
      note,updatedAt:new Date().toISOString()
    });
    const isToday=saveDate===td();
    toast(`💾 ${name} ${isToday?'今日':''+saveDate} 紀錄已儲存`);
  }catch(e){ toast('❌ 儲存失敗：'+e.message); }
}

async function delA(name,date){ if(!confirm(`確定刪除 ${name} 的 ${date} 紀錄？`))return; try{ await db.ref(`attendance/${nk(name)}/${date}`).remove(); toast('🗑 已刪除'); }catch(e){ toast('❌ 刪除失敗'); } }

// ══════════════════════════════════════════════════
//  自訂時數
// ══════════════════════════════════════════════════
function togCH(idx){ const v=document.getElementById('lh-'+idx)?.value,w=document.getElementById('ch-'+idx); if(w)w.style.display=v==='custom'?'block':'none'; }
function updCH(idx){ const v=parseFloat(document.getElementById('chv-'+idx)?.value||0),el=document.getElementById('chd-'+idx); if(el)el.textContent=v>0?`≈ ${(Math.min(7.5,Math.max(0.5,Math.round(v*2)/2))/8).toFixed(4).replace(/\.?0+$/,'')} 天`:''; }

// ══════════════════════════════════════════════════
//  請假送出 / 刪除
// ══════════════════════════════════════════════════
async function subLv(name){
  const idx=EMPS.indexOf(name);
  const type=document.getElementById(`lt-${idx}`)?.value||'other';
  const half=document.getElementById(`lh-${idx}`)?.value||'full';
  const customH=document.getElementById(`chv-${idx}`)?.value||'';
  const from=document.getElementById(`lf-${idx}`)?.value;
  const to=document.getElementById(`lo-${idx}`)?.value;
  const reason=document.getElementById(`lr-${idx}`)?.value.trim()||'';
  const agent=document.getElementById(`la-${idx}`)?.value.trim()||'';
  const tasks=document.getElementById(`lk-${idx}`)?.value.trim()||'';
  if(!from||!to){toast('⚠️ 請選擇日期');return;}
  if(to<from){toast('⚠️ 結束日期不可早於開始日期');return;}
  if(half==='custom'&&(!customH||parseFloat(customH)<=0)){toast('⚠️ 請輸入請假時數');return;}
  const lid='lv_'+Date.now();
  try{

    html+=`</div>`;

  }).join('');

async function setSt(name,lid,status,reason=''){

function prRj(name,lid){ const r=prompt(`否准 ${name} 的請假，請輸入原因（可留空）：`); if(r===null)return; setSt(name,lid,'rejected',r); }

function renderSt(){

function exAt(){
  const emp=document.getElementById('fe')?.value||'',from=document.getElementById('ff')?.value||'',to=document.getElementById('ft')?.value||'';
  const all=window._hat||[];let rows=[];
  EMPS.filter(n=>!emp||n===emp).forEach(n=>{ Object.values(all[nk(n)]||{}).forEach(r=>{ if(from&&r.date<from)return; if(to&&r.date>to)return; rows.push({...r,name:n}); }); });
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  const lines=[['員工姓名','日期','上班','下班','正常工時','加班開始','加班結束','加班時數','備註'].join(',')];
  rows.forEach(r=>{ const d=dur(r.in,r.out,true),od=dur(r.ots,r.ote); lines.push([r.name,r.date,r.in||'',r.out||'',d?`${d.h}h${d.m}m`:'',r.ots||'',r.ote||'',od?`${od.h}h${od.m}m`:'',`"${(r.note||'').replace(/"/g,'""')}"`].join(',')); });
  dlCSV(lines,'出勤紀錄.csv');

function exLv(){
  const all=window._hlv||{};let rows=[];
  EMPS.forEach(n=>{ Object.values(all[nk(n)]||{}).forEach(lv=>rows.push({...lv,name:n})); });
  rows.sort((a,b)=>b.from.localeCompare(a.from));
  const lines=[['員工姓名','假別','開始日期','結束日期','天數','狀態','申請時間','請假事由','代理人','交辦事項'].join(',')];
  rows.forEach(r=>{ const info=lti(r.type),ds=ldstr(r.half,ld(r.from,r.to),r.customH),sl={pending:'待審',approved:'核准',rejected:'不核准'}[r.status||'pending']; lines.push([r.name,info.l,r.from,r.to,ds,sl,r.createdAt?new Date(r.createdAt).toLocaleDateString('zh-TW'):'',`"${(r.reason||'').replace(/"/g,'""')}"`,`"${(r.agent||'').replace(/"/g,'""')}"`,`"${(r.tasks||'').replace(/"/g,'""')}"`].join(',')); });
  dlCSV(lines,'請假紀錄.csv');
}
function dlCSV(lines,fn){ const b=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=fn; a.click(); toast('⬇ '+fn+' 已匯出'); }

      <div style="background:var(--s);border:1px solid var(--bd);border-radius:14px;padding:20px;text-align:left">
        <div style="font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:12px;letter-spacing:.06em;text-transform:uppercase">員工帳號</div>
        ${EMPS.map((n,i)=>`
          <button onclick="go(${i})" style="display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-radius:9px;padding:9px 10px;cursor:pointer;text-align:left;transition:background .15s;margin-bottom:4px;font-family:'Noto Sans TC',sans-serif" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">
            <div style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,${CLR[i]},${lg(CLR[i])});display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">${n[0]}</div>
            <span style="font-size:14px;font-weight:500;color:var(--ink)">${n}</span>
            <span style="margin-left:auto;font-size:11px;color:var(--ink3)">🔒</span>
          </button>`).join('')}
        <div style="border-top:1px solid var(--bd);margin:12px 0"></div>
        <button onclick="openHR()" style="display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;border-radius:9px;padding:9px 10px;cursor:pointer;text-align:left;transition:background .15s;font-family:'Noto Sans TC',sans-serif" onmouseover="this.style.background='var(--s2)'" onmouseout="this.style.background='none'">
          <div style="width:32px;height:32px;border-radius:50%;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🔐</div>
          <span style="font-size:14px;font-weight:500;color:var(--bl)">HR 主管</span>
          <span style="margin-left:auto;font-size:11px;color:var(--ink3)">🔒</span>
        </button>
      </div>
    </div>`;
}
</script>
</body>
</html>
