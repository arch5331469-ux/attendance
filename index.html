<script>
// ══════════════════════════════════════════════════
//  Firebase 設定
// ══════════════════════════════════════════════════
const FB = {
  apiKey:"AIzaSyCP_tx_SU0I-c44Z88RDfsASLHi8zy6BQ4",
  authDomain:"attendance-management-613a6.firebaseapp.com",
  databaseURL:"https://attendance-management-613a6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"attendance-management-613a6",
  storageBucket:"attendance-management-613a6.firebasestorage.app",
  messagingSenderId:"189554042903",
  appId:"1:189554042903:web:2bdad6f0c334ff70319452"
};
firebase.initializeApp(FB);
const db = firebase.database();

// ══════════════════════════════════════════════════
//  設定
// ══════════════════════════════════════════════════
const EMPS = ['郭宗銘','劉芝杏','陳碧真','黃美瑛','黃玉珠','蘇怡娟','黃信恆'];
const CLR  = ['#c8402a','#2456a4','#1e7d5a','#8b3db8','#d4750a','#b5386e','#2e7d9a'];
const HRPW = '1234';

// 員工登入密碼（可自行修改）
const EMP_PW = {
  '郭宗銘': '0001',
  '劉芝杏': '0002',
  '陳碧真': '0003',
  '黃美瑛': '0004',
  '黃玉珠': '0005',
  '蘇怡娟': '0006',
  '黃信恆': '0007',
};

// 員工入職日期（西元年）
const EMP_HIRE = {
  '郭宗銘': '1994-09-02',
  '劉芝杏': '1995-05-16',
  '陳碧真': '2001-03-05',
  '黃美瑛': '2003-04-01',
  '黃玉珠': '2011-12-01',
  '蘇怡娟': '2014-07-14',
  '黃信恆': '2017-05-01',
};

// 薪資設定（每小時扣薪金額）
const EMP_SALARY = {
  '郭宗銘': { monthly:63000, personal:280, sick:140 },
  '劉芝杏': { monthly:70000, personal:311, sick:156 },
  '陳碧真': { monthly:50000, personal:222, sick:111 },
  '黃美瑛': { monthly:61000, personal:271, sick:136 },
  '黃玉珠': { monthly:50000, personal:222, sick:111 },
  '蘇怡娟': { monthly:70000, personal:311, sick:156 },
  '黃信恆': { monthly:41500, personal:184, sick:92  },
};

// 計算請假扣薪（事假/家庭照顧假=personal費率，病假=sick費率，其他不扣）
function calcDeduction(name, leaveType, half, days, customH) {
  const sal = EMP_SALARY[name];
  if (!sal) return 0;
  // 計算實際請假小時數
  let hours = 0;
  if (!half || half === 'full') hours = days * 8;
  else if (half === 'half_am' || half === 'half_pm') hours = 4;
  else if (half === 'custom') hours = Math.min(7.5, Math.max(0.5, Math.round((parseFloat(customH)||0)*2)/2));
  else { const m = half.match(/^([\d.]+)h$/); if(m) hours = parseFloat(m[1]); }
  if (hours <= 0) return 0;

  // 扣薪費率
  if (leaveType === 'personal' || leaveType === 'other') return Math.round(sal.personal * hours);
  if (leaveType === 'sick') return Math.round(sal.sick * hours);
  // 家庭照顧假（other類別中，或可獨立判斷）
  if (leaveType === 'family') return Math.round(sal.personal * hours);
  // 特休、婚假、喪假、補休 不扣薪
  return 0;
}

// 計算某人某月/某年的總扣薪
function calcTotalDeduction(name, leaves) {
  return leaves.reduce((sum, lv) => {
    return sum + calcDeduction(name, lv.type, lv.half, lv.days||0, lv.customH);
  }, 0);
}

// 計算實際年資（今天）
function calcSeniority(hireDateStr) {
  const start = new Date(hireDateStr);
  const today = new Date();
  let years = today.getFullYear() - start.getFullYear();
  let months = today.getMonth() - start.getMonth();
  if (today.getDate() < start.getDate()) months--;
  if (months < 0) { years--; months += 12; }
  const totalMonths = years * 12 + months;
  return { years, months, totalMonths };
}

// 依勞基法計算特休（依年數）
function calcAnnualLeave(years) {
  if (years < 1)  return 0;
  if (years < 2)  return 7;
  if (years < 3)  return 10;
  if (years < 5)  return 14;
  if (years < 10) return 15;
  return Math.min(15 + (years - 10), 30);
}

// 顯示天數+時數
// 規則：整天(8的倍數)顯示天數+時數，半天(4h)顯示半天+時數，其他只顯示時數
function fmtDayHour(days) {
  if (!days || days === 0) return '—';
  const hours = parseFloat((days * 8).toFixed(1));
  if (hours < 8) {
    const hStr = hours === 0.5 ? '30分' : hours + 'h';
    return `<span style="font-size:13px;font-weight:600">${hStr}</span>`;
  }
  const d = parseFloat((hours / 8).toFixed(2));
  return `<div style="line-height:1.3;white-space:nowrap"><span style="font-size:13px;font-weight:600">${d}天</span><br><span style="font-size:11px;color:var(--ink3)">(${hours}h)</span></div>`;
}

// 曆年制：以當年12/31年資計算本年度特休
function calcYearlyLeave(hireDateStr) {
  const start = new Date(hireDateStr);
  const currentYear = new Date().getFullYear();
  const dec31 = new Date(currentYear, 11, 31); // 12/31
  let years = dec31.getFullYear() - start.getFullYear();
  if ((start.getMonth() > dec31.getMonth()) ||
      (start.getMonth() === dec31.getMonth() && start.getDate() > dec31.getDate())) {
    years--;
  }
  return { years, leave: calcAnnualLeave(years) };
}

const td = ()=> new Date().toISOString().slice(0,10);
const nk = n => n.replace(/[.#$[\]]/g,'_');
const lti = id => LTS.find(t=>t.id===id)||LTS[6];
const ld = (f,t)=>{ if(!f||!t)return 0; return Math.max(0,Math.round((new Date(t)-new Date(f))/86400000)+1); };
const toM = t=>{ if(!t)return null; const[h,m]=t.split(':').map(Number); return h*60+m; };
const lg = n => '#'+n.replace(/^#/,'').match(/.{2}/g).map(c=>Math.min(255,parseInt(c,16)+60).toString(16).padStart(2,'0')).join('');

function dur(a,b,lunch=false){
  const ai=toM(a),bi=toM(b);
  if(ai==null||bi==null||bi<=ai)return null;
  let m=bi-ai;
  if(lunch){ const os=Math.max(ai,LUNCH_S),oe=Math.min(bi,LUNCH_E); if(oe>os)m-=(oe-os); }
  if(m<=0)return null;
  return{h:Math.floor(m/60),m:m%60,total:m};
}
function ldays(half,dc,ch){
  if(!half||half==='full')return dc;
  if(half==='half_am'||half==='half_pm')return dc*0.5;
  if(half==='custom'){ const h=parseFloat(ch); return isNaN(h)?0:parseFloat((Math.min(7.5,Math.max(0.5,Math.round(h*2)/2))/8).toFixed(4)); }
  const m=half.match(/^([\d.]+)h$/); if(m)return parseFloat((parseFloat(m[1])/8).toFixed(4));
  return dc;
}
function ldstr(half,dc,ch){
  if(!half||half==='full')return dc+'天';
  if(half==='half_am')return '上午半天';
  if(half==='half_pm')return '下午半天';
  if(half==='custom'){ const h=parseFloat(ch)||0; return h===0.5?'30分鐘':h+'小時'; }
  const m=half.match(/^([\d.]+)h$/); if(m){ const h=parseFloat(m[1]); return h===0.5?'30分鐘':h+'小時'; }
  return dc+'天';
}
function lhl(half,ch){
  if(!half||half==='full')return '';
  if(half==='half_am')return ' (上午半天)';
  if(half==='half_pm')return ' (下午半天)';
  if(half==='custom'){ const h=parseFloat(ch)||0; return ' ('+(h===0.5?'30分鐘':h+'小時')+')'; }
  const m=half.match(/^([\d.]+)h$/); if(m){ const h=parseFloat(m[1]); return ' ('+(h===0.5?'30分鐘':h+'小時')+')'; }
  return '';
}
function fmtD(d){ const o=new Date(d+'T00:00:00'); return `${d}（星期${WDS[o.getDay()]}）`; }

function sync(s){

  if(!d)return;
  d.className='dot'+(s==='ok'?' ok':s==='err'?' err':' spin');
  l.textContent={ok:'即時同步中 ✓',spin:'連線中…',err:'連線失敗'}[s]||'連線中…';
}

function buildTabs(){
  const bar=document.getElementById('tabs');
  bar.querySelectorAll('.etb').forEach(e=>e.remove());
  const ttb=document.getElementById('ttb');
  // 未登入時不顯示員工分頁
  if(!loginUser && !hrOk){ updPD(); return; }
  // HR登入時顯示所有員工分頁；一般員工不顯示分頁
  if(hrOk){
    const spacer = document.createElement('div');
    spacer.className = 'etb';
    spacer.style.flex = '1';
    bar.insertBefore(spacer, ttb);

    EMPS.forEach((name,i)=>{
      const b=document.createElement('button');
      b.className='tb etb'+(i===curTab?' act':'');
      b.textContent=name; b.onclick=()=>go(i);
      bar.insertBefore(b,spacer);
    });
  }
  updPD();
}
function go(i){
  const name=EMPS[i];
  if(!hrOk && loginUser !== name){
    openEmpLogin(name);
    return;
  }
  stopLive();
  curTab=i;
  // 不改變 hrOk 狀態，保持 HR 登入
  buildTabs();
  document.getElementById('ttb').classList.remove('act');
  renderEmp(name);
}

function updPD(){
  db.ref('leaves').once('value').then(s=>{
    const all=s.val()||{};
    const has=Object.values(all).some(e=>Object.values(e||{}).some(l=>l.status==='pending'));
    const b=document.getElementById('htb');
    let p=b.querySelector('.pd');
    if(has&&!p){p=document.createElement('span');p.className='pd';b.appendChild(p);}
    if(!has&&p)p.remove();
  });
}

function chkEPw(){
  const name=empLoginTarget;
  const entered=document.getElementById('epw').value;
  if(entered===EMP_PW[name]){
    loginUser=name; closeEmp();
    const i=EMPS.indexOf(name);
    stopLive(); curTab=i; buildTabs();
    document.getElementById('htb').classList.remove('act');

    document.getElementById('epwe').style.display='block';
    document.getElementById('epw').value='';
    document.getElementById('epw').focus();
  }
}

// 員工申請補打彈窗
function showRetroApply(name){
  const today=td();
  const d=prompt(`請輸入要補打的日期（格式：YYYY-MM-DD）\n例：${today}`);
  if(!d)return;
  if(d>=today){toast('⚠️ 只能申請過去的日期');return;}
  if(!/^\d{4}-\d{2}-\d{2}$/.test(d)){toast('⚠️ 日期格式錯誤，請用 YYYY-MM-DD');return;}
  const reason=prompt(`補打 ${d} 的原因：`);
  if(reason===null)return;
  if(!reason.trim()){toast('⚠️ 請填寫補打原因');return;}
  const rid='retro_'+Date.now();
  db.ref(`retro/${nk(name)}/${rid}`).set({

    status:'pending', createdAt:new Date().toISOString()
  }).then(()=>toast('📝 補打申請已送出，等待主管核准')).catch(()=>toast('❌ 送出失敗'));
}

// 選擇要補打的日期
function selectRetroDate(name, date, retroId){
  if(!window._retroDate)window._retroDate={};
  window._retroDate[name]=date;
  const idx=EMPS.indexOf(name);
  // Load existing data for that date
  db.ref(`attendance/${nk(name)}/${date}`).once('value').then(s=>{
    const r=s.val()||{};
    ts[name]={in:r.in||'',out:r.out||'',ots:r.ots||'',ote:r.ote||''};
    const t=ts[name];
    const pv={in:`pi-${idx}`,out:`po-${idx}`,ots:`ps-${idx}`,ote:`pe-${idx}`};
    const pm={in:`pm-${idx}`,out:`pmo-${idx}`,ots:`pms-${idx}`,ote:`pme-${idx}`};
    const im={in:`mi-${idx}`,out:`mo-${idx}`,ots:`ms-${idx}`,ote:`me-${idx}`};
    const cm={in:' in',out:' out',ots:' ot',ote:' ot'};
    Object.keys(pv).forEach(k=>{
      const el=document.getElementById(pv[k]),meta=document.getElementById(pm[k]),inp=document.getElementById(im[k]);
      if(el){el.textContent=t[k]||'--:--';el.className='pv'+(t[k]?cm[k]:'');}
      if(meta)meta.textContent=t[k]?'✓ 已有紀錄':'';
      if(inp)inp.value=t[k]||'';
    });

    const btn=document.querySelector(`button[onclick="saveAttend('${name}')"]`);
    if(btn)btn.innerHTML=`💾 儲存 ${date} 的補打紀錄`;
    // Show cancel retro button
    const wrap=document.getElementById(`retro-wrap-${idx}`);
    const cancelDiv=document.getElementById(`retro-cancel-${idx}`);
    if(!cancelDiv&&wrap){
      const div=document.createElement('div');
      div.id=`retro-cancel-${idx}`;
      div.style.cssText='background:var(--acl);border:1px solid #f5c4bc;border-radius:9px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px';
      div.innerHTML=`<span style="font-size:13px;color:var(--ac);font-weight:600">📅 補打模式：${date}</span><button onclick="cancelRetro('${name}')" style="margin-left:auto;font-size:11px;background:var(--ac);color:#fff;border:none;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;font-weight:600">取消補打</button>`;
      wrap.insertBefore(div,wrap.firstChild);
    }
    toast(`📋 請填入 ${date} 的打卡時間`);
  });
}

function cancelRetro(name){
  const idx=EMPS.indexOf(name);
  if(window._retroDate)window._retroDate[name]=null;
  // Reset to today
  const today=td();
  db.ref(`attendance/${nk(name)}/${today}`).once('value').then(s=>{
    const r=s.val()||{};
    ts[name]={in:r.in||'',out:r.out||'',ots:r.ots||'',ote:r.ote||''};
  });
  const div=document.getElementById(`retro-cancel-${idx}`);
  if(div)div.remove();
  const btn=document.querySelector(`button[onclick="saveAttend('${name}')"]`);

function punch(name,type){
  const now=new Date(), t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(!ts[name])ts[name]={in:'',out:'',ots:'',ote:''};
  ts[name][type]=t;
  const idx=EMPS.indexOf(name);
  const dm={in:`pi-${idx}`,out:`po-${idx}`,ots:`ps-${idx}`,ote:`pe-${idx}`};
  const mm={in:`pm-${idx}`,out:`pmo-${idx}`,ots:`pms-${idx}`,ote:`pme-${idx}`};
  const im={in:`mi-${idx}`,out:`mo-${idx}`,ots:`ms-${idx}`,ote:`me-${idx}`};
  const cm={in:' in',out:' out',ots:' ot',ote:' ot'};
  const lm={in:'上班',out:'下班',ots:'加班開始',ote:'加班結束'};
  const el=document.getElementById(dm[type]),meta=document.getElementById(mm[type]),inp=document.getElementById(im[type]);
  if(el){el.textContent=t;el.className='pv'+cm[type];}
  if(meta)meta.textContent='✓ 已打卡';
  if(inp)inp.value=t;
  toast(`✅ ${name} ${lm[type]} ${t}`);
}
function ms(name,type,val){ if(!ts[name])ts[name]={in:'',out:'',ots:'',ote:''}; ts[name][type]=val; }

// 讀取目前Firebase該日資料，合併後寫回（避免覆蓋另一方的資料）
async function mergeAndSave(name, saveDate, fields){
  const snap = await db.ref(`attendance/${nk(name)}/${saveDate}`).once('value');
  const existing = snap.val() || {};
  const merged = {...existing, ...fields, date:saveDate, name, updatedAt:new Date().toISOString()};
  await db.ref(`attendance/${nk(name)}/${saveDate}`).set(merged);
}

async function saveAttend(name){
  const idx=EMPS.indexOf(name), t=ts[name]||{};
  const manuals=[['mi','in'],['mo','out']];
  manuals.forEach(([p,k])=>{ const v=document.getElementById(`${p}-${idx}`)?.value; if(v)t[k]=v; });
  const saveDate=window._retroDate&&window._retroDate[name]||td();
  const d=dur(t.in,t.out,true);
  try{
    await mergeAndSave(name, saveDate, {
      in:t.in||'', out:t.out||'',
      duration:d?`${d.h}h${d.m}m`:''
    });
    const isToday=saveDate===td();
    toast(`💾 ${name} ${isToday?'今日':saveDate} 出勤紀錄已儲存`);
  }catch(e){ toast('❌ 儲存失敗：'+e.message); }
}

async function saveOT(name){
  const idx=EMPS.indexOf(name), t=ts[name]||{};
  const manuals=[['ms','ots'],['me','ote']];
  manuals.forEach(([p,k])=>{ const v=document.getElementById(`${p}-${idx}`)?.value; if(v)t[k]=v; });
  const otReason=document.getElementById(`otr-${idx}`)?.value.trim()||'';
    const saveDate=document.getElementById(`otd-${idx}`)?.value||td(); const od=dur(t.ots,t.ote);
  if(!t.ots&&!t.ote){ toast('⚠️ 請先填入加班時間'); return; }
  try{
    await mergeAndSave(name, saveDate, {
      ots:t.ots||'', ote:t.ote||'',
      otDuration:od?`${od.h}h${od.m}m`:'',
      otReason
    });
    toast(`💾 ${name} 加班紀錄已儲存`);
  }catch(e){ toast('❌ 儲存失敗：'+e.message); }
}

async function delA(name,date){ if(!confirm(`確定刪除 ${name} 的 ${date} 紀錄？`))return; try{ await db.ref(`attendance/${nk(name)}/${date}`).remove(); toast('🗑 已刪除'); }catch(e){ toast('❌ 刪除失敗'); } }

function updCH(idx){ const v=parseFloat(document.getElementById('chv-'+idx)?.value||0),el=document.getElementById('chd-'+idx); if(el)el.textContent=v>0?`≈ ${(Math.min(7.5,Math.max(0.5,Math.round(v*2)/2))/8).toFixed(4).replace(/\.?0+$/,'')} 天`:''; }

async function subLv(name){
  const idx=EMPS.indexOf(name);
  const type=document.getElementById(`lt-${idx}`)?.value||'other';
  const half=document.getElementById(`lh-${idx}`)?.value||'full';
  const customH=document.getElementById(`chv-${idx}`)?.value||'';
  const from=document.getElementById(`lf-${idx}`)?.value;
  const to=document.getElementById(`lo-${idx}`)?.value;
  const reason=document.getElementById(`lr-${idx}`)?.value.trim()||'';
  const agent=document.getElementById(`la-${idx}`)?.value.trim()||'';
  const tasks=document.getElementById(`lk-${idx}`)?.value.trim()||'';
  if(!from||!to){toast('⚠️ 請選擇日期');return;}
  if(to<from){toast('⚠️ 結束日期不可早於開始日期');return;}
  if(half==='custom'&&(!customH||parseFloat(customH)<=0)){toast('⚠️ 請輸入請假時數');return;}
  const lid='lv_'+Date.now();
  try{
    await db.ref(`leaves/${nk(name)}/${lid}`).set({
      leaveId:lid,name,type,half,customH:customH||'',from,to,reason,agent,tasks,
      days:ldays(half,ld(from,to),customH),
      status:'pending',createdAt:new Date().toISOString()
    });
    document.getElementById(`lr-${idx}`).value='';
    document.getElementById(`la-${idx}`).value='';
    document.getElementById(`lk-${idx}`).value='';
    toast('📋 請假申請已送出，等待主管審核');
  }catch(e){ toast('❌ 送出失敗：'+e.message); }
}

  for(let day=1; day<=daysInMonth; day++){
    const ds = `${currentYear}-${monthStr}-${String(day).padStart(2,'0')}`;
    const dt = new Date(ds+'T00:00:00');
    const isWeekend = dt.getDay()===0||dt.getDay()===6;
    const isToday = ds===today;
    const ol = [];
    EMPS.forEach((name,i)=>{
      Object.values(all[nk(name)]||{})
        .filter(l=>(l.status==='approved'||l.status==='pending')&&l.from<=ds&&l.to>=ds&&(!selType||l.type===selType))
        .forEach(lv=>{
          const info=lti(lv.type);
          ol.push({name,clr:CLR[i],info,lv});
        });
    });

    if(!ol.length&&!isToday) continue; // 無請假且非今天跳過

    html += `<tr style="background:${isToday?'#fffbe6':isWeekend?'var(--s2)':''}">
      <td style="white-space:nowrap;font-family:'JetBrains Mono',monospace;font-size:12px">
        ${ds}<br>
        <span style="font-size:10px;color:${isWeekend?'var(--ac)':'var(--ink3)'}">星期${WDS[dt.getDay()]}${isToday?' 今天':''}${isWeekend?' 假日':''}</span>
      </td>
      <td>${!ol.length?`<span style="color:var(--ink3);font-size:12px">—</span>`:
        ol.map(o=>`<span style="display:inline-flex;align-items:center;gap:4px;margin:2px 6px 2px 0">
          <span style="width:6px;height:6px;border-radius:50%;background:${o.clr};display:inline-block"></span>
          <span style="font-size:12px;font-weight:600">${o.name}</span>
          <span class="ltg ${o.info.id}" style="font-size:10px;padding:1px 6px">${o.info.l}</span>
          ${o.lv.status==='pending'?'<span style="font-size:10px;color:#b45309">待審</span>':''}
        </span>`).join('')}
      </td>
    </tr>`;
  }
  html += `</tbody></table></div></div>`;
  document.getElementById('main').innerHTML = document.getElementById('main').innerHTML.replace(
    document.getElementById('main').querySelector('#_team_placeholder')?.outerHTML||'', ''
  );

  // 找到 main 裡面的 team 內容區塊並更新
  const teamBody = document.getElementById('team-content');
  if(teamBody){ teamBody.innerHTML = html; }
  else { document.getElementById('main').innerHTML = html; }
}

function loadAt(){
  const emp=document.getElementById('fe')?.value||'',from=document.getElementById('ff')?.value||'',to=document.getElementById('ft')?.value||'',today=td();
  const all=window._hat||{};
  let rows=[];
  EMPS.filter(n=>!emp||n===emp).forEach(n=>{ Object.values(all[nk(n)]||{}).forEach(r=>{ if(from&&r.date<from)return; if(to&&r.date>to)return; rows.push({...r,name:n}); }); });
  rows.sort((a,b)=>b.date.localeCompare(a.date)||EMPS.indexOf(a.name)-EMPS.indexOf(b.name));
  const te=emp?[emp]:EMPS,tr2=rows.filter(r=>r.date===today),comp=tr2.filter(r=>r.in&&r.out).length;
  const tm=rows.filter(r=>r.in&&r.out).reduce((s,r)=>{const d=dur(r.in,r.out,true);return s+(d?d.total:0);},0);
  const ot=rows.filter(r=>r.ots&&r.ote).reduce((s,r)=>{const d=dur(r.ots,r.ote);return s+(d?d.total:0);},0);
  document.getElementById('ats').innerHTML=`<div class="hsc"><div class="hsv">${rows.length}</div><div class="hsl">總紀錄筆數</div></div><div class="hsc"><div class="hsv">${comp}/${te.length}</div><div class="hsl">今日完整打卡</div></div><div class="hsc"><div class="hsv">${Math.floor(tm/60)}h</div><div class="hsl">總工時</div></div><div class="hsc" style="border-color:#d8c8f8"><div class="hsv" style="color:var(--pu)">${Math.floor(ot/60)}h${ot%60}m</div><div class="hsl">總加班時數</div></div>`;
  const tb=document.getElementById('atb');
  if(!rows.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--ink3);padding:28px">此範圍無紀錄</td></tr>';return;}
  tb.innerHTML=rows.map(r=>{
    const clr=CLR[EMPS.indexOf(r.name)],d=dur(r.in,r.out,true),od=dur(r.ots,r.ote),rd=new Date(r.date+'T00:00:00');
    const durStr = d ? d.h+'h'+d.m+'m' : '--';
    const odStr  = od ? od.h+'h'+od.m+'m' : '—';
    const otBtns = (r.ots||r.ote)
      ? ('<button class="brs" style="background:var(--bll);color:var(--bl);border-color:#c8d8f0" onclick="editOTReason(\'' + r.name + '\',\'' + r.date + '\')">✏️ 編輯</button>'
        + ' <button class="brj" style="background:#fff0f0;color:#c0392b;border-color:#f5c4bc" onclick="hrDelOT(\'' + r.name + '\',\'' + r.date + '\')">🗑</button>')
      : '—';
    return '<tr>'
      +'<td><div class="ec"><div class="cd" style="background:'+clr+'"></div>'+r.name+'</div></td>'
      +'<td style="font-size:12px;font-family:JetBrains Mono,monospace">'+r.date+'<br><span style="color:var(--ink3);font-size:10px">星期'+WDS[rd.getDay()]+(r.date===today?' 今天':'')+'</span></td>'
      +'<td><span class="bg '+(r.in?'bgi':'bgm')+'">'+(r.in||'缺卡')+'</span></td>'
      +'<td><span class="bg '+(r.out?'bgo':'bgm')+'">'+(r.out||'缺卡')+'</span></td>'
      +'<td><span class="bg '+(d?'bgd':'bgm')+'">'+durStr+'</span></td>'
      +'<td><span class="bg '+(r.ots?'bgt':'bgm')+'">'+(r.ots||'—')+'</span></td>'
      +'<td><span class="bg '+(r.ote?'bgt':'bgm')+'">'+(r.ote||'—')+'</span></td>'
      +'<td><span class="bg '+(od?'bgt':'bgm')+'">'+odStr+'</span></td>'
      +'<td class="nc" title="'+(r.otReason||'')+'">'+(r.otReason||'—')+'</td>'
      +'<td class="nc" title="'+(r.note||'')+'">'+(r.note||'—')+'</td>'
      +'<td style="white-space:nowrap">'+otBtns+'</td>'
      +'</tr>';
  }).join('');
}

  }).join('');

    const clr = CLR[i];
    // 篩選當月已核准假單
    const lvs = Object.values(all[nk(name)]||{}).filter(l=>{
      if(l.status!=='approved') return false;
      // 假單開始或結束在當月內
      return l.from.startsWith(prefix) || l.to.startsWith(prefix) ||
             (l.from <= prefix+'-31' && l.to >= prefix+'-01');
    });

    if(!lvs.length) return; // 當月無請假跳過
    hasData = true;

    const counts = {};
    LTS.forEach(t=>{ counts[t.id]=lvs.filter(l=>l.type===t.id).reduce((s,l)=>s+ldays(l.half,ld(l.from,l.to),l.customH),0); });
    const tot = Object.values(counts).reduce((s,v)=>s+v,0);
    const personalDeduct = lvs.filter(l=>l.type==='personal'||l.type==='family').reduce((sum,lv)=>sum+calcDeduction(name,lv.type,lv.half,lv.days||ld(lv.from,lv.to),lv.customH),0);
    const sickDeduct = lvs.filter(l=>l.type==='sick').reduce((sum,lv)=>sum+calcDeduction(name,lv.type,lv.half,lv.days||ld(lv.from,lv.to),lv.customH),0);
    const totalDeduct = personalDeduct + sickDeduct;

    html += `<tr>
      <td><div class="ec"><div class="cd" style="background:${clr}"></div>${name}</div></td>
      ${LTS.map(t=>`<td style="text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:${counts[t.id]>0?'var(--te)':'var(--ink3)'}">${counts[t.id]>0?counts[t.id]:'—'}</td>`).join('')}
      <td style="text-align:center"><span class="bg bgl">${tot}</span></td>
      <td style="text-align:center;min-width:110px">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">$${EMP_SALARY[name]?.personal||0}/時</div>
        ${personalDeduct>0?`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ac)">-$${personalDeduct.toLocaleString()}</span>`:'<span style="color:var(--ink3)">—</span>'}
      </td>
      <td style="text-align:center;min-width:110px">
        <div style="font-size:10px;color:var(--ink3);margin-bottom:2px">$${EMP_SALARY[name]?.sick||0}/時</div>
        ${sickDeduct>0?`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--or)">-$${sickDeduct.toLocaleString()}</span>`:'<span style="color:var(--ink3)">—</span>'}
      </td>
      <td style="text-align:center">
        ${totalDeduct>0?`<span style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--ac);font-size:14px">-$${totalDeduct.toLocaleString()}</span>`:'<span style="color:var(--ink3)">—</span>'}
      </td>
    </tr>`;
  });

  if(!hasData){
    html += `<tr><td colspan="${LTS.length+4}" style="text-align:center;color:var(--ink3);padding:28px">${month} 月無請假紀錄</td></tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('st-body').innerHTML = html;
}

    const tot = Object.values(counts).reduce((s,v)=>s+v,0);

      <td style="text-align:center;font-weight:600;color:${usedAnnual>0?'var(--ac)':'var(--ink3)'}">${fmtDayHour(usedAnnual)}</td>
      <td style="text-align:center"><span style="font-weight:700;color:${remaining>0?'var(--gr)':'var(--ac)'}">${fmtDayHour(remaining)}</span></td>

function exAt(){
  const emp=document.getElementById('fe')?.value||'',from=document.getElementById('ff')?.value||'',to=document.getElementById('ft')?.value||'';
  const all=window._hat||[];let rows=[];
  EMPS.filter(n=>!emp||n===emp).forEach(n=>{ Object.values(all[nk(n)]||{}).forEach(r=>{ if(from&&r.date<from)return; if(to&&r.date>to)return; rows.push({...r,name:n}); }); });
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  const lines=[['員工姓名','日期','上班','下班','正常工時','加班開始','加班結束','加班時數','加班事由','備註'].join(',')];
  rows.forEach(r=>{ const d=dur(r.in,r.out,true),od=dur(r.ots,r.ote); lines.push([r.name,r.date,r.in||'',r.out||'',d?`${d.h}h${d.m}m`:'',r.ots||'',r.ote||'',od?`${od.h}h${od.m}m`:'',`"${(r.otReason||'').replace(/"/g,'""')}"`,`"${(r.note||'').replace(/"/g,'""')}"`].join(',')); });
  dlCSV(lines,'出勤紀錄.csv');
}
function exLv(){
  const all=window._hlv||{};let rows=[];
  EMPS.forEach(n=>{ Object.values(all[nk(n)]||{}).forEach(lv=>rows.push({...lv,name:n})); });
  rows.sort((a,b)=>b.from.localeCompare(a.from));
  const lines=[['員工姓名','假別','開始日期','結束日期','天數','狀態','申請時間','請假事由','代理人','交辦事項'].join(',')];
  rows.forEach(r=>{ const info=lti(r.type),ds=ldstr(r.half,ld(r.from,r.to),r.customH),sl={pending:'待審',approved:'核准',rejected:'不核准'}[r.status||'pending']; lines.push([r.name,info.l,r.from,r.to,ds,sl,r.createdAt?new Date(r.createdAt).toLocaleDateString('zh-TW'):'',`"${(r.reason||'').replace(/"/g,'""')}"`,`"${(r.agent||'').replace(/"/g,'""')}"`,`"${(r.tasks||'').replace(/"/g,'""')}"`].join(',')); });
  dlCSV(lines,'請假紀錄.csv');
}
function exStMonth(month){
  const all = window._hlv || {};
  const currentYear = new Date().getFullYear();
  const monthStr = String(month).padStart(2,'0');
  const monthStart = `${currentYear}-${monthStr}-01`;
  const monthEnd   = `${currentYear}-${monthStr}-31`;

  const lines = [['員工','假別','開始日期','結束日期','天數','時數','狀態','請假事由','代理人'].join(',')];
  EMPS.forEach(name=>{
    const lvs = Object.values(all[nk(name)]||{}).filter(l=>{
      if(l.status!=='approved') return false;
      return l.from <= monthEnd && l.to >= monthStart;
    });
    lvs.forEach(lv=>{
      const info = lti(lv.type);
      const days = ldays(lv.half, ld(lv.from,lv.to), lv.customH);
      const hours = parseFloat((days*8).toFixed(1));
      lines.push([
        name, info.l, lv.from, lv.to,
        days, hours+'h',
        '核准',
        `"${(lv.reason||'').replace(/"/g,'""')}"`,
        `"${(lv.agent||'').replace(/"/g,'""')}"`
      ].join(','));
    });
  });
  dlCSV(lines, `${currentYear}年${month}月請假統計.csv`);
}

function exStYear(){
  const all = window._hlv || {};
  const currentYear = new Date().getFullYear();

  // Header row
  const header = ['員工','入職日期','年資','特休天數','已用特休','剩餘特休',
    ...LTS.filter(t=>t.id!=='annual').map(t=>t.l),
    '請假合計'
  ];
  const lines = [header.join(',')];

  EMPS.forEach(name=>{
    const lvs = Object.values(all[nk(name)]||{}).filter(l=>
      l.status==='approved' && l.from.startsWith(String(currentYear))
    );
    const counts = {};
    LTS.forEach(t=>{ counts[t.id]=lvs.filter(l=>l.type===t.id).reduce((s,l)=>s+ldays(l.half,ld(l.from,l.to),l.customH),0); });
    const tot = Object.values(counts).reduce((s,v)=>s+v,0);
    const hireDate = EMP_HIRE[name]||'';
    const { years, months } = EMP_HIRE[name] ? calcSeniority(EMP_HIRE[name]) : {years:0,months:0};
    const { leave: annualDays } = EMP_HIRE[name] ? calcYearlyLeave(EMP_HIRE[name]) : {leave:0};
    const usedAnnual = counts['annual']||0;
    const remaining = Math.max(0, annualDays - usedAnnual);

    lines.push([
      name, hireDate, `${years}年${months}月`,
      annualDays, usedAnnual, remaining,
      ...LTS.filter(t=>t.id!=='annual').map(t=>counts[t.id]||0),
      tot
    ].join(','));
  });
  dlCSV(lines, `${currentYear}年度請假總表.csv`);
}

// ── HR 編輯請假說明 ──────────────────────────────
async function hrDelLeave(name, leaveId, date){
  if(!confirm(`確定刪除 ${name} 的 ${date} 假單？\n此操作無法復原！`)) return;
  try{
    await db.ref(`leaves/${nk(name)}/${leaveId}`).remove();
    toast(`🗑 已刪除 ${name} 的假單`);
  }catch(e){ toast('❌ 刪除失敗：'+e.message); }
}

function editLeaveById(name, leaveId){
  db.ref(`leaves/${nk(name)}/${leaveId}`).once('value').then(s=>{
    const lv = s.val()||{};
    editLeave(name, leaveId, lv.reason||'', lv.agent||'', lv.tasks||'');
  });
}

function editLeave(name, leaveId, reason, agent, tasks){
  // Decode HTML entities
  reason = reason.replace(/&#39;/g,"'");
  agent  = agent.replace(/&#39;/g,"'");
  tasks  = tasks.replace(/&#39;/g,"'");

  // Create modal
  const modal = document.createElement('div');
  modal.className = 'mb';
  modal.id = 'edit-lv-modal';
  modal.innerHTML = `
    <div class="md" style="width:360px;max-width:92vw">
      <h3>✏️ 編輯請假說明</h3>
      <p style="color:var(--ink2);font-size:13px;margin-bottom:16px">${name} 的假單</p>
      <div class="fl" style="margin-bottom:10px">
        <label>請假事由</label>
        <textarea id="el-reason" rows="2" style="background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 10px;width:100%;resize:none">${reason}</textarea>
      </div>
      <div class="fl" style="margin-bottom:10px">
        <label>代理人</label>
        <input type="text" id="el-agent" value="${agent}" style="background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 10px;width:100%;outline:none">
      </div>
      <div class="fl" style="margin-bottom:16px">
        <label>交辦事項</label>
        <textarea id="el-tasks" rows="3" style="background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--ink);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 10px;width:100%;resize:none">${tasks}</textarea>
      </div>
      <div class="mdb">
        <button class="mc" onclick="document.getElementById('edit-lv-modal').remove()">取消</button>
        <button class="mo" onclick="saveEditLeave('${name}','${leaveId}')">💾 儲存</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  setTimeout(()=>document.getElementById('el-reason').focus(),50);
}

async function saveEditLeave(name, leaveId){
  const reason = document.getElementById('el-reason')?.value.trim()||'';
  const agent  = document.getElementById('el-agent')?.value.trim()||'';
  const tasks  = document.getElementById('el-tasks')?.value.trim()||'';
  try{
    await db.ref(`leaves/${nk(name)}/${leaveId}`).update({
      reason, agent, tasks,
      updatedAt: new Date().toISOString()
    });
    document.getElementById('edit-lv-modal').remove();
    toast('✅ 請假說明已更新');
  }catch(e){ toast('❌ 儲存失敗：'+e.message); }
}

function dlCSV(lines,fn){ const b=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=fn; a.click(); toast('⬇ '+fn+' 已匯出'); }
